<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Enter — A World Made For You 🌙</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#030012">

<!-- Premium Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;700&family=Josefin+Sans:wght@100;200;300;400&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════
   DESIGN TOKENS — SUHAINA UNIVERSE
════════════════════════════════════════════════ */
:root {
  /* Colors */
  --void:      #030012;
  --abyss:     #05001e;
  --deep:      #09002a;
  --plasma:    #0f003a;
  --cyan:      #00e5ff;
  --cyan2:     #00b4d8;
  --pink:      #ff1a6b;
  --pink2:     #ff4d8f;
  --violet:    #8b00ff;
  --gold:      #ffc300;
  --goldf:     #ffe066;

  /* Glow */
  --gc: 0 0 8px #00e5ff, 0 0 25px rgba(0,229,255,.5), 0 0 60px rgba(0,229,255,.2);
  --gp: 0 0 8px #ff1a6b, 0 0 25px rgba(255,26,107,.5), 0 0 60px rgba(255,26,107,.2);
  --gv: 0 0 8px #8b00ff, 0 0 25px rgba(139,0,255,.4);
  --gg: 0 0 8px #ffc300, 0 0 25px rgba(255,195,0,.4);

  /* Glass */
  --g1: rgba(0,229,255,.04);
  --g2: rgba(0,229,255,.08);
  --b1: rgba(0,229,255,.12);
  --b2: rgba(0,229,255,.38);

  /* Typography */
  --font-tech: 'Orbitron', monospace;
  --font-lux:  'Cormorant Garamond', serif;
  --font-rom:  'Dancing Script', cursive;
  --font-ui:   'Josefin Sans', sans-serif;

  /* Easing */
  --spring: cubic-bezier(.34,1.56,.64,1);
  --silk:   cubic-bezier(.25,.46,.45,.94);
  --snap:   cubic-bezier(.4,0,.2,1);
}

/* ── RESET ── */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--void);
  font-family: var(--font-ui);
  font-weight: 300;
  cursor: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  user-select: none;
  -webkit-user-select: none;
}

/* ── CUSTOM CURSOR ── */
#cursor-dot, #cursor-ring {
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  border-radius: 50%;
  transform: translate(-50%,-50%);
  will-change: transform;
  transition: opacity .3s;
}
#cursor-dot {
  width: 6px; height: 6px;
  background: var(--cyan);
  box-shadow: var(--gc);
}
#cursor-ring {
  width: 34px; height: 34px;
  border: 1px solid rgba(0,229,255,.45);
  transition: width .4s var(--spring), height .4s var(--spring), border-color .4s;
}
.cursor-expand #cursor-ring {
  width: 56px; height: 56px;
  border-color: rgba(255,26,107,.45);
}
@media (pointer:coarse) { #cursor-dot, #cursor-ring { display:none; } }

/* ── CANVAS LAYERS ── */
#cvs-bg, #cvs-stars, #cvs-particles {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
#cvs-bg      { z-index: 0; }
#cvs-stars   { z-index: 1; }
#cvs-particles { z-index: 2; }

/* ── MOON ── */
#moon-scene {
  position: fixed;
  top: 5vh; right: 8vw;
  z-index: 3;
  pointer-events: none;
}
.moon {
  width: clamp(80px, 11vw, 140px);
  height: clamp(80px, 11vw, 140px);
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fff9e6, #ffedb5, #ffd54f, #ff8f00);
  box-shadow:
    0 0 30px rgba(255,213,79,.9),
    0 0 80px rgba(255,213,79,.5),
    0 0 180px rgba(255,213,79,.2),
    inset 0 0 30px rgba(255,200,0,.3);
  animation: moonFloat 9s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
.moon::before {
  content: '';
  position: absolute;
  top: 15%; left: 25%;
  width: 22%; height: 22%;
  border-radius: 50%;
  background: rgba(220,160,0,.25);
}
.moon::after {
  content: '';
  position: absolute;
  top: 55%; left: 58%;
  width: 14%; height: 14%;
  border-radius: 50%;
  background: rgba(220,160,0,.2);
}
@keyframes moonFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-16px) scale(1.02); }
}

/* Moon halo */
.moon-halo {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 1px solid rgba(255,213,79,.15);
}
.moon-halo:nth-child(1) { width:160%; height:160%; animation: haloP 4s ease-in-out infinite; }
.moon-halo:nth-child(2) { width:220%; height:220%; animation: haloP 4s ease-in-out infinite .8s; }
.moon-halo:nth-child(3) { width:300%; height:300%; animation: haloP 4s ease-in-out infinite 1.6s; }
@keyframes haloP {
  0%,100% { opacity:.4; transform:translate(-50%,-50%) scale(1); }
  50% { opacity:.1; transform:translate(-50%,-50%) scale(1.05); }
}

/* ── GIRL SILHOUETTE ── */
.girl-wrap {
  position: fixed;
  bottom: 0;
  right: calc(8vw + clamp(80px,11vw,140px) + 1.5rem);
  z-index: 3;
  pointer-events: none;
  animation: girlFloat 8s ease-in-out infinite;
}
@keyframes girlFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-22px); }
}

/* ── HILLS ── */
.hills {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 3;
  pointer-events: none;
}

/* ── FLOATING HEARTS ── */
.fheart {
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  animation: fhUp 4s ease-out forwards;
  will-change: transform, opacity;
}
@keyframes fhUp {
  0%   { opacity:.95; transform:translateY(0) scale(1) rotate(0deg); }
  100% { opacity:0;   transform:translateY(-420px) scale(.08) rotate(25deg); }
}

/* ── SCENE WRAPPER ── */
#scene {
  position: fixed; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
  perspective: 1400px;
}

/* ── 3D TILT WRAPPER ── */
#tilt {
  width: 100%; max-width: 460px;
  transform-style: preserve-3d;
  will-change: transform;
  transition: transform .12s linear;
}

/* ── CARD ── */
.card {
  position: relative;
  background: linear-gradient(
    135deg,
    rgba(0,10,50,.88),
    rgba(0,5,30,.92),
    rgba(8,0,35,.9)
  );
  border-radius: 28px;
  padding: clamp(2rem,5vw,3rem) clamp(1.8rem,5vw,2.8rem);
  backdrop-filter: blur(50px) saturate(200%);
  -webkit-backdrop-filter: blur(50px) saturate(200%);
  overflow: hidden;
}

/* Animated border */
.card::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 28px;
  background: conic-gradient(
    from var(--angle, 0deg),
    var(--cyan), var(--pink), var(--violet), var(--gold), var(--cyan)
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  padding: 1.5px;
  animation: borderSpin 5s linear infinite;
  opacity: .6;
}
@property --angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}
@keyframes borderSpin { to { --angle: 360deg; } }

/* Inner glow orbs */
.card-orb {
  position: absolute; border-radius: 50%;
  filter: blur(60px); pointer-events: none;
}
.orb1 {
  width: 200px; height: 200px;
  background: rgba(0,229,255,.07);
  top: -60px; left: -60px;
  animation: orbDrift 12s ease-in-out infinite;
}
.orb2 {
  width: 160px; height: 160px;
  background: rgba(255,26,107,.06);
  bottom: -50px; right: -50px;
  animation: orbDrift 14s ease-in-out infinite reverse;
}
.orb3 {
  width: 120px; height: 120px;
  background: rgba(139,0,255,.05);
  top: 50%; left: 50%;
  animation: orbDrift 10s ease-in-out infinite 2s;
}
@keyframes orbDrift {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(15px,12px) scale(1.15); }
}

/* ── LOGO / HEADER ── */
.logo-area { text-align: center; margin-bottom: 2rem; position: relative; z-index: 1; }
.logo-glyph {
  display: inline-block;
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(0,229,255,.15), rgba(255,26,107,.15));
  border: 1px solid rgba(0,229,255,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; margin: 0 auto 1rem;
  box-shadow: var(--gc), inset 0 0 20px rgba(0,229,255,.05);
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { box-shadow: var(--gc), inset 0 0 20px rgba(0,229,255,.05); transform: scale(1); }
  50% { box-shadow: var(--gc), inset 0 0 35px rgba(0,229,255,.1), 0 0 80px rgba(0,229,255,.15); transform: scale(1.04); }
}
.logo-title {
  font-family: var(--font-tech);
  font-size: clamp(.8rem, 2.5vw, 1.05rem);
  font-weight: 600;
  letter-spacing: .35em;
  text-transform: uppercase;
  background: linear-gradient(90deg, var(--cyan), var(--pink), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 6px rgba(0,229,255,.3));
}
.logo-sub {
  font-family: var(--font-rom);
  font-size: clamp(1.1rem, 3vw, 1.4rem);
  color: rgba(255,215,0,.65);
  margin-top: .3rem;
  letter-spacing: .04em;
}

/* ── DIVIDER ── */
.div-row {
  display: flex; align-items: center; gap: .8rem;
  margin: .5rem 0 1.8rem;
  position: relative; z-index: 1;
}
.div-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--b1), transparent); }
.div-icon { font-size: .7rem; color: rgba(0,229,255,.4); }

/* ── FORM GROUPS ── */
.fg {
  position: relative; z-index: 1;
  margin-bottom: 1.4rem;
}
.fg-label {
  display: block;
  font-family: var(--font-tech);
  font-size: .55rem;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: rgba(0,229,255,.45);
  margin-bottom: .6rem;
  transition: color .3s;
}
.fg:focus-within .fg-label { color: var(--cyan); }

.fi-wrap { position: relative; }
.fi-icon {
  position: absolute; left: 1rem; top: 50%;
  transform: translateY(-50%);
  font-size: .9rem; opacity: .4;
  pointer-events: none;
  transition: opacity .3s;
}
.fg:focus-within .fi-icon { opacity: .9; }

.finput {
  width: 100%;
  background: rgba(0,229,255,.035);
  border: 1px solid var(--b1);
  border-radius: 14px;
  padding: .9rem 1rem .9rem 2.9rem;
  color: #fff;
  font-family: var(--font-ui);
  font-size: .95rem;
  font-weight: 400;
  letter-spacing: .06em;
  outline: none;
  -webkit-appearance: none;
  transition: border-color .35s, background .35s, box-shadow .35s, transform .2s var(--spring);
}
.finput::placeholder {
  color: rgba(255,255,255,.2);
  font-style: italic;
  letter-spacing: .04em;
}
.finput:focus {
  border-color: rgba(0,229,255,.5);
  background: rgba(0,229,255,.055);
  box-shadow: 0 0 0 4px rgba(0,229,255,.07), 0 0 25px rgba(0,229,255,.08);
  transform: translateY(-1px);
}
.finput.err {
  border-color: rgba(255,26,107,.55);
  box-shadow: 0 0 0 4px rgba(255,26,107,.07);
}

/* ── DOB PICKER ── */
.dob-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: .7rem;
}
.dob-select {
  width: 100%;
  background: rgba(0,229,255,.035);
  border: 1px solid var(--b1);
  border-radius: 14px;
  padding: .9rem .6rem;
  color: #fff;
  font-family: var(--font-ui);
  font-size: .88rem;
  text-align: center;
  outline: none;
  cursor: none;
  -webkit-appearance: none;
  transition: border-color .35s, background .35s, box-shadow .35s, transform .2s var(--spring);
}
.dob-select:focus {
  border-color: rgba(0,229,255,.5);
  background: rgba(0,229,255,.055);
  box-shadow: 0 0 0 4px rgba(0,229,255,.07);
  transform: translateY(-1px);
}
.dob-select option { background: #05001e; color: rgba(255,255,255,.9); }
.dob-lbl {
  display: block; text-align: center; margin-top: .35rem;
  font-size: .48rem; letter-spacing: .2em;
  color: rgba(0,229,255,.35);
  font-family: var(--font-tech); text-transform: uppercase;
}

/* ── SUBMIT BUTTON ── */
.sbtn {
  position: relative; z-index: 1;
  width: 100%; margin-top: 1.6rem;
  padding: 1.05rem;
  border-radius: 50px; border: none;
  background: linear-gradient(135deg, #0a00cc, #8b00ff, #ff1a6b, #ff8800);
  background-size: 300% 300%;
  animation: btnGrad 6s ease infinite;
  color: #fff;
  font-family: var(--font-tech);
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .28em;
  text-transform: uppercase;
  box-shadow: 0 0 30px rgba(139,0,255,.4), 0 12px 40px rgba(0,0,0,.5);
  overflow: hidden;
  transition: transform .4s var(--spring), box-shadow .4s;
}
@keyframes btnGrad {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.sbtn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 0 50px rgba(0,229,255,.4), 0 16px 50px rgba(0,0,0,.6);
}
.sbtn:active { transform: scale(.98); }
.sbtn-shine {
  position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 38%, rgba(255,255,255,.22) 50%, transparent 62%);
  background-size: 200% 100%;
  animation: shineSweep 2.4s ease-in-out infinite;
}
@keyframes shineSweep {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.sbtn-txt {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center; gap: .6rem;
}
.sloader {
  display: none;
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,.25);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

/* ── ERROR MESSAGE ── */
#err-msg {
  margin-top: .8rem;
  position: relative; z-index: 1;
  text-align: center;
  min-height: 1.5rem;
}
.err-inner {
  display: inline-flex; align-items: center; gap: .5rem;
  background: rgba(255,26,107,.1);
  border: 1px solid rgba(255,26,107,.3);
  border-radius: 50px;
  padding: .45rem 1.2rem;
  font-family: var(--font-rom);
  font-size: 1rem;
  color: rgba(255,100,140,.9);
  opacity: 0;
  transform: translateY(8px) scale(.95);
  transition: opacity .4s var(--spring), transform .4s var(--spring);
}
.err-inner.show {
  opacity: 1; transform: translateY(0) scale(1);
}

/* ── SECURE NOTE ── */
.secure-note {
  position: relative; z-index: 1;
  text-align: center;
  margin-top: 1.2rem;
  font-size: .52rem;
  letter-spacing: .18em;
  color: rgba(255,255,255,.18);
  font-family: var(--font-tech);
}

/* ── SUCCESS OVERLAY ── */
#success-ov {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, rgba(0,5,30,.98), rgba(3,0,18,1));
  opacity: 0; pointer-events: none;
  transition: opacity .9s ease;
  text-align: center; padding: 2rem;
}
#success-ov.show { opacity: 1; pointer-events: all; }
.so-ring {
  width: 110px; height: 110px; border-radius: 50%;
  margin: 0 auto 1.8rem;
  background: linear-gradient(135deg, rgba(0,229,255,.15), rgba(255,26,107,.15));
  border: 2px solid rgba(0,229,255,.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 3.2rem;
  box-shadow: var(--gc);
  animation: soScale .8s var(--spring) both;
}
@keyframes soScale { from { transform: scale(0) rotate(-180deg); } to { transform: scale(1) rotate(0); } }
.so-h {
  font-family: var(--font-rom);
  font-size: clamp(2.5rem, 8vw, 4rem);
  background: linear-gradient(135deg, var(--gold), var(--pink), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: soSlide .9s var(--spring) .3s both;
  opacity: 0;
}
.so-s {
  font-family: var(--font-tech);
  font-size: .62rem; letter-spacing: .4em;
  color: rgba(0,229,255,.6);
  margin-top: .8rem;
  animation: soSlide .9s var(--spring) .6s both;
  opacity: 0;
}
@keyframes soSlide {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- CURSOR -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- CANVAS LAYERS -->
<canvas id="cvs-bg"></canvas>
<canvas id="cvs-stars"></canvas>
<canvas id="cvs-particles"></canvas>

<!-- MOON -->
<div id="moon-scene">
  <div class="moon">
    <div class="moon-halo"></div>
    <div class="moon-halo"></div>
    <div class="moon-halo"></div>
  </div>
</div>

<!-- GIRL SILHOUETTE -->
<div class="girl-wrap">
  <svg width="72" height="145" viewBox="0 0 72 145" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow-girl">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g filter="url(#glow-girl)" fill="#1a0035" stroke="rgba(255,26,107,.3)" stroke-width=".5">
      <!-- Head -->
      <ellipse cx="36" cy="17" rx="11" ry="12"/>
      <!-- Hair flowing -->
      <path d="M26 10 Q14 3 18 28 Q24 24 26 22"/>
      <path d="M46 10 Q58 4 52 25 Q48 22 46 20"/>
      <path d="M26 10 Q36 6 46 10 Q44 2 36 1 Q28 2 26 10z"/>
      <!-- Body / Torso -->
      <path d="M26 28 Q36 35 46 28 L50 60 Q36 66 22 60 Z"/>
      <!-- Flowing Dress -->
      <path d="M22 60 Q12 90 18 128 Q36 135 54 128 Q60 90 50 60 Q36 72 22 60Z"/>
      <!-- Dress shimmer detail -->
      <path d="M30 65 Q36 70 42 65 Q40 90 36 110 Q32 90 30 65Z" fill="rgba(255,26,107,.12)" stroke="none"/>
      <!-- Left arm -->
      <path d="M26 32 Q15 48 19 58" stroke-width="5" stroke-linecap="round" fill="none"/>
      <!-- Right arm raised with heart -->
      <path d="M46 32 Q58 22 55 12" stroke-width="5" stroke-linecap="round" fill="none"/>
      <!-- Heart in raised hand -->
    </g>
    <text x="52" y="10" font-size="14" fill="#ff1a6b" filter="url(#glow-girl)" style="filter:drop-shadow(0 0 6px #ff1a6b)">♥</text>
  </svg>
</div>

<!-- HILLS -->
<svg class="hills" viewBox="0 0 1440 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:fixed;bottom:0;left:0;right:0;z-index:3;pointer-events:none;height:220px">
  <path d="M0,220 Q200,100 400,165 Q600,225 800,115 Q1000,30 1200,150 Q1350,225 1440,100 L1440,220Z"
        fill="rgba(5,0,30,.92)"/>
  <path d="M0,220 Q250,140 480,185 Q700,220 920,150 Q1100,95 1260,175 Q1380,220 1440,140 L1440,220Z"
        fill="rgba(8,0,40,.95)"/>
  <path d="M0,220 L1440,220 L1440,190 Q800,165 0,195Z"
        fill="rgba(9,0,42,1)"/>
</svg>

<!-- SUCCESS OVERLAY -->
<div id="success-ov">
  <div class="so-ring">💖</div>
  <div class="so-h">Welcome…</div>
  <div class="so-s">Opening your world ✨</div>
</div>

<!-- LOGIN SCENE -->
<div id="scene">
  <div id="tilt">
    <div class="card">
      <!-- Orbs -->
      <div class="card-orb orb1"></div>
      <div class="card-orb orb2"></div>
      <div class="card-orb orb3"></div>

      <!-- Logo -->
      <div class="logo-area">
        <div class="logo-glyph">🌙</div>
        <div class="logo-title">Suhaina · Universe</div>
        <div class="logo-sub">A world made only for you</div>
      </div>

      <div class="div-row">
        <div class="div-line"></div>
        <span class="div-icon">✦</span>
        <div class="div-line"></div>
      </div>

      <form id="login-form" novalidate autocomplete="off">
        <!-- Register Number -->
        <div class="fg" id="fg-reg">
          <label class="fg-label" for="f-regno">College Register Number</label>
          <div class="fi-wrap">
            <span class="fi-icon">🎓</span>
            <input
              class="finput" type="text" id="f-regno"
              placeholder="e.g. 23UIT110"
              maxlength="12"
              autocomplete="off"
              spellcheck="false"
              autocorrect="off"
              autocapitalize="characters"
            >
          </div>
        </div>

        <!-- Date of Birth -->
        <div class="fg" id="fg-dob">
          <label class="fg-label">Date of Birth</label>
          <div class="dob-grid">
            <div>
              <select class="dob-select" id="dob-d" aria-label="Day">
                <option value="" disabled selected>Day</option>
              </select>
              <span class="dob-lbl">Day</span>
            </div>
            <div>
              <select class="dob-select" id="dob-m" aria-label="Month">
                <option value="" disabled selected>Month</option>
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
              </select>
              <span class="dob-lbl">Month</span>
            </div>
            <div>
              <select class="dob-select" id="dob-y" aria-label="Year">
                <option value="" disabled selected>Year</option>
              </select>
              <span class="dob-lbl">Year</span>

          </div>

        <!-- Submit -->
        <button type="submit" class="sbtn" id="sbtn">
          <span class="sbtn-shine"></span>
          <span class="sbtn-txt">
            <span id="sbtn-label">Enter Your World</span>
            <div class="sloader" id="sloader"></div>
          </span>
        </button>

        <!-- Error -->
        <div id="err-msg">
          <div class="err-inner" id="err-inner"></div>
        </div>

        <p class="secure-note">✦ This experience is crafted exclusively for you ✦</p>
      </form>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
                                                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp }
                                                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ─── Load config ─────────────────────────────────────────────────────────────
let app, auth, db;
try {
  const cfg = await import('./config.js');
  app  = initializeApp(cfg.FIREBASE_CONFIG);
  auth = getAuth(app);
  db   = getFirestore(app);
  window.__fb = { auth, db, signInWithEmailAndPassword, createUserWithEmailAndPassword, collection, addDoc, serverTimestamp };
} catch(e) {
  console.warn('[Firebase] Not configured yet — running in demo mode');
  window.__fb = null;
}
</script>

<script>
/* ══════════════════════════════════════════
   CURSOR
══════════════════════════════════════════ */
const dot = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx + 'px';
  dot.style.top  = my + 'px';
}, { passive: true });

(function cursorLoop() {
  rx += (mx - rx) * .12;
  ry += (my - ry) * .12;
  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';
  requestAnimationFrame(cursorLoop);
})();

document.querySelectorAll('button, input, select, .card').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('cursor-expand'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-expand'));
});

/* ══════════════════════════════════════════
   3D TILT
══════════════════════════════════════════ */
const scene = document.getElementById('scene');
const tilt  = document.getElementById('tilt');

scene.addEventListener('mousemove', e => {
  const r  = scene.getBoundingClientRect();
  const nx = (e.clientX - r.left) / r.width  - .5;
  const ny = (e.clientY - r.top)  / r.height - .5;
  tilt.style.transform = `rotateY(${nx * 12}deg) rotateX(${-ny * 9}deg)`;
});
scene.addEventListener('mouseleave', () => {
  tilt.style.transition = 'transform .9s cubic-bezier(.34,1.56,.64,1)';
  tilt.style.transform  = 'none';
  setTimeout(() => tilt.style.transition = 'transform .12s linear', 900);
});

/* ══════════════════════════════════════════
   MULTI-LAYER CANVAS RENDERING
══════════════════════════════════════════ */
// Background mesh gradients
const bg = document.getElementById('cvs-bg');
const bgX = bg.getContext('2d');

// Stars
const sc  = document.getElementById('cvs-stars');
const scX = sc.getContext('2d');

// Particles
const pc  = document.getElementById('cvs-particles');
const pcX = pc.getContext('2d');

let W = 0, H = 0;
let stars = [], particles = [];

function resize() {
  W = bg.width = sc.width = pc.width = window.innerWidth;
  H = bg.height = sc.height = pc.height = window.innerHeight;
  initStars();
  initParticles();
}

function initStars() {
  stars = Array.from({ length: 280 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H * .88,
    r: Math.random() * 1.5 + .2,
    tw: Math.random() * Math.PI * 2,
    sp: .005 + Math.random() * .018,
    col: Math.random() < .07
      ? [0, 229, 255]
      : Math.random() < .05
        ? [255, 26, 107]
        : [255, 255, 255]
  }));
}

function initParticles() {
  particles = Array.from({ length: 38 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 2.5 + .6,
    vx: (Math.random() - .5) * .28,
    vy: -(Math.random() * .5 + .15),
    life: Math.random(),
    col: Math.random() < .55 ? [0, 229, 255] : [255, 26, 107]
  }));
}

let bgT = 0;
function drawAll() {
  bgT += .0018;

  /* — Background shifting nebula — */
  bgX.clearRect(0, 0, W, H);
  const g1 = bgX.createRadialGradient(
    W * (.3 + Math.sin(bgT) * .12), H * (.35 + Math.cos(bgT * .7) * .1), 0,
    W * .5, H * .5, Math.max(W, H) * .9
  );
  g1.addColorStop(0, `hsla(${270 + Math.sin(bgT) * 15}, 80%, 8%, .6)`);
  g1.addColorStop(.5, `hsla(${240 + Math.cos(bgT) * 20}, 70%, 5%, .5)`);
  g1.addColorStop(1, 'rgba(3,0,18,0)');
  bgX.fillStyle = g1;
  bgX.fillRect(0, 0, W, H);

  const g2 = bgX.createRadialGradient(
    W * (.75 + Math.cos(bgT * .8) * .1), H * (.6 + Math.sin(bgT * .6) * .12), 0,
    W * .65, H * .6, Math.max(W, H) * .7
  );
  g2.addColorStop(0, `hsla(${10 + Math.sin(bgT * 1.3) * 15}, 80%, 7%, .4)`);
  g2.addColorStop(1, 'transparent');
  bgX.fillStyle = g2;
  bgX.fillRect(0, 0, W, H);

  /* — Stars — */
  scX.clearRect(0, 0, W, H);
  stars.forEach(s => {
    s.tw += s.sp;
    const o = .2 + Math.sin(s.tw) * .55;
    scX.beginPath();
    scX.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    scX.fillStyle = `rgba(${s.col.join(',')},${Math.max(0, o)})`;
    scX.fill();
    if (s.r > .9) {
      scX.beginPath();
      scX.arc(s.x, s.y, s.r * 2.8, 0, Math.PI * 2);
      scX.fillStyle = `rgba(${s.col.join(',')},${o * .1})`;
      scX.fill();
    }
  });

  /* — Particles — */
  pcX.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life += .0022;
    if (p.y < -20 || p.life > 1) { p.y = H + 20; p.x = Math.random() * W; p.life = 0; }
    const a = Math.max(0, Math.sin(p.life * Math.PI)) * .5;
    pcX.beginPath();
    pcX.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pcX.fillStyle = `rgba(${p.col.join(',')},${a})`;
    pcX.fill();
  });

  requestAnimationFrame(drawAll);
}

resize();
drawAll();
window.addEventListener('resize', resize, { passive: true });

/* ══════════════════════════════════════════
   HEARTS ON CLICK
══════════════════════════════════════════ */
const HEARTS = ['💗','💕','💖','💓','💝','✨','🌸','💫','⭐','🌟'];
function spawnHearts(x, y, n = 2) {
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'fheart';
    el.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
    el.style.cssText = `
      left:${x + (Math.random() - .5) * 60}px;
      top:${y}px;
      font-size:${Math.random() * .9 + .9}rem;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}
document.addEventListener('click', e => spawnHearts(e.clientX, e.clientY, 3), { passive: true });
document.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  spawnHearts(t.clientX, t.clientY, 3);
}, { passive: true });

/* Periodic hearts near moon */
(function moonHearts() {
  const m = document.querySelector('.moon');
  if (m) {
    const r = m.getBoundingClientRect();
    spawnHearts(r.left + r.width / 2, r.top + r.height, 2);
  }
  setTimeout(moonHearts, 2500 + Math.random() * 2000);
})();

/* ══════════════════════════════════════════
   POPULATE DOB DROPDOWNS
══════════════════════════════════════════ */
const dDay = document.getElementById('dob-d');
const dYear = document.getElementById('dob-y');
for (let d = 1; d <= 31; d++) {
  const o = document.createElement('option');
  o.value = d; o.textContent = String(d).padStart(2, '0');
  dDay.appendChild(o);
}
const cy = new Date().getFullYear();
for (let y = cy; y >= 1990; y--) {
  const o = document.createElement('option');
  o.value = y; o.textContent = y;
  dYear.appendChild(o);
}

/* ══════════════════════════════════════════
   FORM LOGIC
══════════════════════════════════════════ */
function showErr(msg) {
  const el = document.getElementById('err-inner');
  el.textContent = msg;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4500);
  document.getElementById('f-regno').classList.add('err');
}

function setLoading(on) {
  const btn = document.getElementById('sbtn');
  const lbl = document.getElementById('sbtn-label');
  const ldr = document.getElementById('sloader');
  btn.disabled = on;
  ldr.style.display = on ? 'block' : 'none';
  lbl.textContent = on ? 'Entering…' : 'Enter Your World';
}

/* Device info */
function getDeviceInfo() {
  const ua = navigator.userAgent;
  let device = 'Desktop', os = 'Unknown', browser = 'Unknown';
  if (/Android/i.test(ua)) os = 'Android';
  else if (/iPhone|iPad/i.test(ua)) os = 'iOS';
  else if (/Windows/i.test(ua)) os = 'Windows';
  else if (/Mac/i.test(ua)) os = 'macOS';
  else if (/Linux/i.test(ua)) os = 'Linux';
  if (/Mobi|Android/i.test(ua)) device = 'Mobile';
  else if (/iPad|Tablet/i.test(ua)) device = 'Tablet';
  if (/Chrome/i.test(ua) && !/Edge/i.test(ua)) browser = 'Chrome';
  else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
  else if (/Firefox/i.test(ua)) browser = 'Firefox';
  else if (/Edge/i.test(ua)) browser = 'Edge';
  return { device, os, browser,
    screen: `${screen.width}×${screen.height}`,
    lang: navigator.language };
}

async function getIP() {
  try {
    const r = await fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(3000) });
    return (await r.json()).ip || 'N/A';
  } catch { return 'N/A'; }
}

async function logVisit(uid, regno) {
  if (!window.__fb) return;
  const { db, collection, addDoc, serverTimestamp } = window.__fb;
  try {
    const ip = await getIP();
    const dev = getDeviceInfo();
    await addDoc(collection(db, 'visits'), {
      uid, regno, ip,
      time_iso: new Date().toISOString(),
      time_ist: new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }),
      serverTimestamp: serverTimestamp(),
      ...dev,
      referrer: document.referrer || 'direct'
    });
  } catch (e) { console.warn('Log failed:', e); }
}

/* ── SUBMIT ── */
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();

  const regno = document.getElementById('f-regno').value.trim().toUpperCase();
  const dDay  = parseInt(document.getElementById('dob-d').value);
  const dMon  = parseInt(document.getElementById('dob-m').value);
  const dYr   = parseInt(document.getElementById('dob-y').value);

  /* Validate format */
  if (!regno) { showErr('Please enter your register number, love 💕'); return; }
  if (!dDay || !dMon || !dYr) { showErr('Please select your date of birth 🌸'); return; }

  /* Validate credentials */
  const validReg = '23UIT102';
  const validDay = 21, validMon = 4, validYr = 2006;

  if (regno !== validReg || dDay !== validDay || dMon !== validMon || dYr !== validYr) {
    document.getElementById('f-regno').classList.add('err');
    // Romantic error, not harsh
    const errs = [
      '✨ Hmm, that doesn't seem right… are you the one I made this for? 💕',
      '🌙 This world is made for someone very special. Try again, dear…',
      '💫 Not quite right — only one heart knows the way in…',
    ];
    showErr(errs[Math.floor(Math.random() * errs.length)]);
    return;
  }

  document.getElementById('f-regno').classList.remove('err');
  setLoading(true);

  /* Firebase Auth */
  const fbEmail = '23UIT102@love.app';
  const fbPass  = '21-04-2006';

  if (window.__fb) {
    const { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.__fb;
    try {
      let cred;
      try { cred = await signInWithEmailAndPassword(auth, fbEmail, fbPass); }
      catch { cred = await createUserWithEmailAndPassword(auth, fbEmail, fbPass); }
      await logVisit(cred.user.uid, regno);
      sessionStorage.setItem('__auth', '1');
    } catch (err) { console.warn('Firebase auth error:', err); sessionStorage.setItem('__auth', '1'); }
  } else {
    sessionStorage.setItem('__auth', '1');
    await new Promise(r => setTimeout(r, 900));
  }

  /* Show success → redirect */
  const ov = document.getElementById('success-ov');
  ov.classList.add('show');
  // Hearts burst
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      for (let j = 0; j < 6; j++) spawnHearts(Math.random() * W, Math.random() * H * .7);
    }, i * 200);
  }
  setTimeout(() => window.location.href = 'index.html', 2800);
});

/* right-click disable */
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
