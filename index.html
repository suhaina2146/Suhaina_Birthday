<style>
:root {
  --void:#030012;--cyan:#00e5ff;--pink:#ff1a6b;--violet:#8b00ff;
  --gold:#ffc300;--b1:rgba(0,229,255,.12);
  --gc:0 0 8px #00e5ff,0 0 25px rgba(0,229,255,.5),0 0 60px rgba(0,229,255,.2);
  --font-tech:'Orbitron',monospace;--font-rom:'Dancing Script',cursive;
  --font-ui:'Josefin Sans',sans-serif;
  --spring:cubic-bezier(.34,1.56,.64,1);
  --ease-smooth:cubic-bezier(.25,.46,.45,.94);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;-webkit-text-size-adjust:100%;}
body{
  min-height:100%;background:var(--void);font-family:var(--font-ui);
  font-weight:300;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  user-select:none;-webkit-user-select:none;overflow-x:hidden;
  cursor:default;
}

/* ── CANVASES ── */
#cvs-bg,#cvs-stars,#cvs-particles{
  position:fixed;inset:0;width:100%;height:100%;pointer-events:none;
}
#cvs-bg{z-index:0;}#cvs-stars{z-index:1;}#cvs-particles{z-index:2;}

/* ── MOON ── */
#moon-scene{
  position:fixed;top:5vh;right:6vw;z-index:3;pointer-events:none;
  animation:moonSceneIn 2s var(--ease-smooth) both;
}
@keyframes moonSceneIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
.moon{
  width:clamp(65px,10vw,130px);height:clamp(65px,10vw,130px);
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff9e6,#ffedb5,#ffd54f,#ff8f00);
  box-shadow:0 0 30px rgba(255,213,79,.9),0 0 80px rgba(255,213,79,.5),
             0 0 180px rgba(255,213,79,.2),inset 0 0 30px rgba(255,200,0,.3);
  animation:moonFloat 9s ease-in-out infinite;position:relative;overflow:hidden;
  will-change:transform;
}
.moon::before{content:'';position:absolute;top:15%;left:25%;width:22%;height:22%;border-radius:50%;background:rgba(220,160,0,.25);}
.moon::after{content:'';position:absolute;top:55%;left:58%;width:14%;height:14%;border-radius:50%;background:rgba(220,160,0,.2);}
@keyframes moonFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-14px) scale(1.02);}}
.moon-halo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(255,213,79,.15);}
.moon-halo:nth-child(1){width:160%;height:160%;animation:haloP 4s ease-in-out infinite;}
.moon-halo:nth-child(2){width:220%;height:220%;animation:haloP 4s ease-in-out infinite .8s;}
.moon-halo:nth-child(3){width:300%;height:300%;animation:haloP 4s ease-in-out infinite 1.6s;}
@keyframes haloP{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1);}50%{opacity:.1;transform:translate(-50%,-50%) scale(1.05);}}
@media(max-width:480px){#moon-scene{top:3vh;right:4vw;}}
@media(max-height:500px){#moon-scene{display:none;}}

/* ── GIRL SILHOUETTE ── */
.girl-wrap{
  position:fixed;bottom:0;
  right:calc(6vw + clamp(65px,10vw,130px) + 1rem);
  z-index:3;pointer-events:none;
  animation:girlFloat 8s ease-in-out infinite,girlIn 2.2s var(--ease-smooth) both;
}
@keyframes girlIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes girlFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
@media(max-width:600px),(max-height:500px){.girl-wrap{display:none;}}

/* ── HILLS ── */
.hills{
  position:fixed;bottom:0;left:0;right:0;z-index:3;pointer-events:none;
  height:clamp(70px,14vh,200px);
}

/* ── FIREFLIES ── */
.firefly{
  position:fixed;pointer-events:none;z-index:4;
  width:4px;height:4px;border-radius:50%;
  background:rgba(255,235,100,.9);
  box-shadow:0 0 6px 2px rgba(255,235,100,.6),0 0 14px rgba(255,200,0,.3);
  animation:fireflyMove var(--dur,8s) ease-in-out infinite var(--delay,0s);
  will-change:transform,opacity;
}
@keyframes fireflyMove{
  0%{opacity:0;transform:translate(0,0) scale(.6);}
  15%{opacity:.9;}
  50%{transform:translate(var(--tx,30px),var(--ty,-40px)) scale(1);}
  85%{opacity:.7;}
  100%{opacity:0;transform:translate(var(--tx2,10px),var(--ty2,20px)) scale(.6);}
}

/* ── FLOATING HEARTS ── */
.fheart{
  position:fixed;pointer-events:none;z-index:9998;
  animation:fhUp 4s ease-out forwards;will-change:transform,opacity;line-height:1;
}
@keyframes fhUp{
  0%{opacity:.95;transform:translateY(0) scale(1) rotate(0deg);}
  100%{opacity:0;transform:translateY(-400px) scale(.05) rotate(20deg);}
}

/* ── SOUND TOGGLE ── */
#sound-btn{
  position:fixed;top:1.2rem;left:1.2rem;z-index:100;
  width:40px;height:40px;border-radius:50%;border:1px solid rgba(0,229,255,.25);
  background:rgba(0,10,40,.6);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s var(--spring);font-size:1.1rem;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  -webkit-tap-highlight-color:transparent;
  animation:fadeInBtn 2s ease both 1s;
}
@keyframes fadeInBtn{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
#sound-btn:hover{border-color:rgba(0,229,255,.55);background:rgba(0,20,60,.8);transform:scale(1.1);}
#sound-btn:active{transform:scale(.93);}
.sound-waves{display:flex;align-items:center;gap:2px;height:16px;}
.sound-waves span{
  display:block;width:2.5px;border-radius:2px;
  background:rgba(0,229,255,.8);
  animation:wave .8s ease-in-out infinite;transform-origin:bottom;
}
.sound-waves span:nth-child(1){height:6px;animation-delay:0s;}
.sound-waves span:nth-child(2){height:12px;animation-delay:.15s;}
.sound-waves span:nth-child(3){height:8px;animation-delay:.3s;}
.sound-waves span:nth-child(4){height:14px;animation-delay:.1s;}
.sound-waves span:nth-child(5){height:5px;animation-delay:.25s;}
@keyframes wave{0%,100%{transform:scaleY(.5);}50%{transform:scaleY(1);}}
.sound-waves.muted span{animation:none;transform:scaleY(.3);opacity:.3;}
#sound-icon-muted{display:none;font-size:1rem;opacity:.5;}

/* ── SCENE ── */
#scene{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  padding:clamp(.6rem,2.5vw,1.5rem);
  perspective:1400px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* ── TILT WRAPPER ── */
#tilt{
  width:100%;max-width:450px;
  transform-style:preserve-3d;will-change:transform;
  transition:transform .15s linear;
  margin-bottom:clamp(50px,11vh,100px);
  animation:cardEntrance 1.2s var(--spring) .3s both;
}
@keyframes cardEntrance{
  from{opacity:0;transform:translateY(40px) scale(.95);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* ── CARD ── */
.card{
  position:relative;
  background:linear-gradient(145deg,rgba(0,10,52,.9),rgba(0,5,28,.93),rgba(7,0,32,.91));
  border-radius:26px;
  padding:clamp(1.6rem,5vw,3rem) clamp(1.4rem,5vw,2.8rem);
  backdrop-filter:blur(60px) saturate(180%);
  -webkit-backdrop-filter:blur(60px) saturate(180%);
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04),
             inset 0 1px 0 rgba(255,255,255,.06);
}
.card::before{
  content:'';position:absolute;inset:-1px;border-radius:26px;
  background:conic-gradient(from var(--angle,0deg),var(--cyan),var(--pink),var(--violet),var(--gold),var(--cyan));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;
  padding:1.5px;animation:borderSpin 6s linear infinite;opacity:.55;
}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false;}
@keyframes borderSpin{to{--angle:360deg;}}

.card::after{
  content:'';position:absolute;inset:0;border-radius:26px;
  background:linear-gradient(145deg,rgba(255,255,255,.03) 0%,transparent 40%);
  pointer-events:none;
}

.card-orb{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;}
.orb1{width:220px;height:220px;background:rgba(0,229,255,.06);top:-70px;left:-70px;animation:orbDrift 13s ease-in-out infinite;}
.orb2{width:180px;height:180px;background:rgba(255,26,107,.05);bottom:-60px;right:-60px;animation:orbDrift 15s ease-in-out infinite reverse;}
.orb3{width:130px;height:130px;background:rgba(139,0,255,.04);top:50%;left:50%;animation:orbDrift 11s ease-in-out infinite 2s;}
@keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(14px,10px) scale(1.12);}}

/* ── LOGO ── */
.logo-area{text-align:center;margin-bottom:1.6rem;position:relative;z-index:1;}
.logo-glyph{
  display:inline-flex;width:clamp(52px,8vw,70px);height:clamp(52px,8vw,70px);
  border-radius:50%;
  background:linear-gradient(135deg,rgba(0,229,255,.12),rgba(255,26,107,.12));
  border:1px solid rgba(0,229,255,.28);
  align-items:center;justify-content:center;
  font-size:clamp(1.4rem,3vw,1.9rem);margin:0 auto .75rem;
  box-shadow:var(--gc),inset 0 0 20px rgba(0,229,255,.04);
  animation:logoPulse 3.5s ease-in-out infinite;
}
@keyframes logoPulse{
  0%,100%{box-shadow:var(--gc),inset 0 0 20px rgba(0,229,255,.04);transform:scale(1);}
  50%{box-shadow:var(--gc),inset 0 0 30px rgba(0,229,255,.09),0 0 70px rgba(0,229,255,.12);transform:scale(1.04);}
}
.logo-title{
  font-family:var(--font-tech);font-size:clamp(.58rem,1.8vw,1rem);
  font-weight:600;letter-spacing:.3em;text-transform:uppercase;
  background:linear-gradient(90deg,var(--cyan),var(--pink),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 5px rgba(0,229,255,.25));
}
.logo-sub{
  font-family:var(--font-rom);font-size:clamp(.9rem,2.2vw,1.3rem);
  color:rgba(255,215,0,.6);margin-top:.28rem;letter-spacing:.04em;
}

/* ── DIVIDER ── */
.div-row{display:flex;align-items:center;gap:.7rem;margin:.35rem 0 1.4rem;position:relative;z-index:1;}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--b1),transparent);}
.div-icon{font-size:.65rem;color:rgba(0,229,255,.35);}

/* ── FORM GROUPS ── */
.fg{position:relative;z-index:1;margin-bottom:1.1rem;}
.fg-label{
  display:block;font-family:var(--font-tech);
  font-size:clamp(.4rem,.85vw,.52rem);letter-spacing:.3em;text-transform:uppercase;
  color:rgba(0,229,255,.4);margin-bottom:.5rem;
  transition:color .3s var(--ease-smooth),letter-spacing .3s;
}
.fg:focus-within .fg-label{color:var(--cyan);letter-spacing:.35em;}

.fi-wrap{position:relative;}
.fi-icon{
  position:absolute;left:.85rem;top:50%;transform:translateY(-50%);
  font-size:.85rem;opacity:.35;pointer-events:none;
  transition:opacity .3s,transform .3s var(--spring);
}
.fg:focus-within .fi-icon{opacity:.85;transform:translateY(-50%) scale(1.1);}

.finput{
  width:100%;background:rgba(0,229,255,.03);border:1px solid var(--b1);
  border-radius:13px;padding:.8rem 1rem .8rem 2.55rem;
  color:#fff;font-family:var(--font-ui);
  font-size:clamp(.8rem,2vw,.93rem);font-weight:300;
  letter-spacing:.06em;outline:none;-webkit-appearance:none;
  transition:border-color .3s,background .3s,box-shadow .35s,transform .2s var(--spring);
  -webkit-tap-highlight-color:transparent;
}
.finput::placeholder{color:rgba(255,255,255,.18);font-style:italic;}
.finput:focus{
  border-color:rgba(0,229,255,.48);background:rgba(0,229,255,.05);
  box-shadow:0 0 0 3px rgba(0,229,255,.06),0 0 22px rgba(0,229,255,.07);
  transform:translateY(-1px);
}
.finput.err{border-color:rgba(255,26,107,.5);box-shadow:0 0 0 3px rgba(255,26,107,.06);animation:shake .45s var(--spring);}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(5px);}60%{transform:translateX(-4px);}80%{transform:translateX(3px);}}

/* ── DOB GRID ── */
.dob-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem;}
.dob-wrap{position:relative;}
.dob-wrap::after{
  content:'▾';position:absolute;right:.55rem;top:50%;transform:translateY(-50%);
  color:rgba(0,229,255,.45);font-size:.75rem;pointer-events:none;line-height:1;
}
.dob-select{
  width:100%;background:rgba(0,229,255,.03);border:1px solid var(--b1);
  border-radius:13px;padding:.8rem 1.5rem .8rem .5rem;color:#fff;
  font-family:var(--font-ui);font-size:clamp(.72rem,1.9vw,.86rem);
  text-align:center;text-align-last:center;outline:none;
  -webkit-appearance:none;appearance:none;
  transition:border-color .3s,background .3s,box-shadow .3s,transform .2s var(--spring);
  -webkit-tap-highlight-color:transparent;cursor:pointer;
}
.dob-select:focus{
  border-color:rgba(0,229,255,.48);background:rgba(0,229,255,.05);
  box-shadow:0 0 0 3px rgba(0,229,255,.06);transform:translateY(-1px);
}
.dob-select.err{border-color:rgba(255,26,107,.5);box-shadow:0 0 0 3px rgba(255,26,107,.06);animation:shake .45s var(--spring);}
.dob-select option{background:#05001e;color:rgba(255,255,255,.9);}
.dob-lbl{
  display:block;text-align:center;margin-top:.28rem;
  font-size:clamp(.34rem,.75vw,.46rem);letter-spacing:.16em;
  color:rgba(0,229,255,.3);font-family:var(--font-tech);text-transform:uppercase;
}

/* ── SUBMIT BUTTON ── */
.sbtn{
  position:relative;z-index:1;width:100%;margin-top:1.3rem;
  padding:clamp(.8rem,2.5vw,1rem);
  border-radius:50px;border:none;
  background:linear-gradient(135deg,#0a00cc,#8b00ff,#ff1a6b,#ff6b00);
  background-size:300% 300%;animation:btnGrad 6s ease infinite;
  color:#fff;font-family:var(--font-tech);
  font-size:clamp(.54rem,1.5vw,.7rem);font-weight:600;
  letter-spacing:.24em;text-transform:uppercase;
  box-shadow:0 0 28px rgba(139,0,255,.35),0 10px 35px rgba(0,0,0,.5);
  overflow:hidden;
  transition:transform .35s var(--spring),box-shadow .35s;
  -webkit-tap-highlight-color:transparent;cursor:pointer;
}
@keyframes btnGrad{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.sbtn:hover{transform:translateY(-2px) scale(1.015);box-shadow:0 0 45px rgba(0,229,255,.35),0 15px 45px rgba(0,0,0,.55);}
.sbtn:active{transform:scale(.97);}
.sbtn:disabled{opacity:.75;cursor:not-allowed;}
.sbtn-shine{
  position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.2) 50%,transparent 62%);
  background-size:200% 100%;animation:shineSweep 2.6s ease-in-out infinite;
}
@keyframes shineSweep{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.sbtn-txt{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:.55rem;}
.sloader{
  display:none;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.22);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* ── ERROR ── */
#err-msg{margin-top:.65rem;position:relative;z-index:1;text-align:center;min-height:1.4rem;}
.err-inner{
  display:inline-flex;align-items:center;gap:.45rem;
  background:rgba(255,26,107,.09);border:1px solid rgba(255,26,107,.28);
  border-radius:50px;padding:.4rem 1rem;
  font-family:var(--font-rom);font-size:clamp(.78rem,1.9vw,.95rem);
  color:rgba(255,110,150,.9);opacity:0;
  transform:translateY(6px) scale(.96);
  transition:opacity .35s var(--spring),transform .35s var(--spring);
}
.err-inner.show{opacity:1;transform:translateY(0) scale(1);}

/* ── SECURE NOTE ── */
.secure-note{
  position:relative;z-index:1;text-align:center;margin-top:.9rem;
  font-size:clamp(.36rem,.85vw,.5rem);letter-spacing:.15em;
  color:rgba(255,255,255,.15);font-family:var(--font-tech);
}

/* ── SUCCESS OVERLAY ── */
#success-ov{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(0,5,30,.98),rgba(3,0,18,1));
  opacity:0;pointer-events:none;
  transition:opacity 1s var(--ease-smooth);
  text-align:center;padding:2rem;
}
#success-ov.show{opacity:1;pointer-events:all;}
.so-ring{
  width:110px;height:110px;border-radius:50%;margin:0 auto 1.8rem;
  background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(255,26,107,.15));
  border:2px solid rgba(0,229,255,.4);
  display:flex;align-items:center;justify-content:center;font-size:3.2rem;
  box-shadow:var(--gc);animation:soScale .8s var(--spring) both;
}
@keyframes soScale{from{transform:scale(0) rotate(-180deg);}to{transform:scale(1) rotate(0);}}
.so-h{
  font-family:var(--font-rom);font-size:clamp(2.2rem,8vw,4rem);
  background:linear-gradient(135deg,var(--gold),var(--pink),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:soSlide .9s var(--spring) .3s both;opacity:0;
}
.so-s{
  font-family:var(--font-tech);font-size:clamp(.48rem,1.4vw,.6rem);
  letter-spacing:.38em;color:rgba(0,229,255,.6);margin-top:.75rem;
  animation:soSlide .9s var(--spring) .6s both;opacity:0;
}
@keyframes soSlide{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

/* ── RESPONSIVE SHORT SCREENS ── */
@media(max-height:620px){
  .logo-area{margin-bottom:.8rem;}
  .logo-glyph{width:46px;height:46px;font-size:1.3rem;margin-bottom:.4rem;}
  .logo-sub{font-size:.85rem;}
  .div-row{margin:.25rem 0 .9rem;}
  .fg{margin-bottom:.75rem;}
  .sbtn{margin-top:.8rem;}
  #tilt{margin-bottom:clamp(38px,7vh,65px);}
  .secure-note{display:none;}
}
/* Tablet width */
@media(min-width:580px) and (max-width:900px){#tilt{max-width:470px;}}
/* Very small phones */
@media(max-width:350px){
  .card{padding:1.2rem 1rem;}
  .dob-grid{gap:.35rem;}
}
</style>
</head>
<body>

<!-- Sound Toggle -->
<button id="sound-btn" aria-label="Toggle ambient sound" title="Toggle night sounds">
  <div class="sound-waves" id="sound-waves">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <span id="sound-icon-muted">🔇</span>
</button>

<canvas id="cvs-bg"></canvas>
<canvas id="cvs-stars"></canvas>

<script>
/* ══════════════════════════════════════
   AMBIENT NIGHT SOUND ENGINE (Web Audio API)
   Crickets + owl hoot + soft wind + gentle chime
══════════════════════════════════════ */
let audioCtx = null;
let masterGain = null;
let soundNodes = [];
let soundEnabled = false;
let audioReady = false;

function initAudio() {
  if (audioReady) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    masterGain.connect(audioCtx.destination);
    audioReady = true;
    buildNightSounds();
  } catch(e) { console.warn('Audio not available:', e); }
}

function buildNightSounds() {
  makeWind();
  makeNightHum();
  setTimeout(scheduleOwl, 5000 + Math.random() * 8000);
  setTimeout(scheduleChime, 3000 + Math.random() * 5000);
}

function makeWind() {
  const bufLen = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 280; lpf.Q.value = 1.2;
  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 60;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.028;
  const swellLfo = audioCtx.createOscillator();
  const swellGain = audioCtx.createGain();
  swellLfo.frequency.value = 0.07;
  swellGain.gain.value = 0.015;
  swellLfo.connect(swellGain);
  swellGain.connect(gain.gain);
  swellLfo.start();
  src.connect(hpf); hpf.connect(lpf); lpf.connect(gain); gain.connect(masterGain);
  src.start();
  soundNodes.push(src, lpf, hpf, gain, swellLfo, swellGain);
}

function makeNightHum() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const vibLfo = audioCtx.createOscillator();
  const vibGain = audioCtx.createGain();
  osc.type = 'sine'; osc.frequency.value = 55;
  vibLfo.frequency.value = 0.12; vibGain.gain.value = 1.5;
  vibLfo.connect(vibGain); vibGain.connect(osc.frequency);
  gain.gain.value = 0.012;
  osc.connect(gain); gain.connect(masterGain);
  osc.start(); vibLfo.start();
  soundNodes.push(osc, gain, vibLfo, vibGain);
}

function scheduleOwl() {
  if (!soundEnabled || !audioReady) { setTimeout(scheduleOwl, 3000); return; }
  const t = audioCtx.currentTime;
  function owlNote(freq, start, dur, vol) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const vib = audioCtx.createOscillator();
    const vibG = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    vib.frequency.value = 5.5; vibG.gain.value = 3;
    vib.connect(vibG); vibG.connect(osc.frequency);
    gain.gain.setValueAtTime(0, t + start);
    gain.gain.linearRampToValueAtTime(vol * 0.06, t + start + 0.12);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + start + dur);
    osc.connect(gain); gain.connect(masterGain);
    osc.start(t + start); osc.stop(t + start + dur + 0.1);
    vib.start(t + start); vib.stop(t + start + dur + 0.1);
  }
  owlNote(320, 0, 0.4, 0.9);
  owlNote(300, 0.5, 0.4, 0.8);
  owlNote(280, 1.1, 0.8, 1.0);
  setTimeout(scheduleOwl, 12000 + Math.random() * 18000);
}

function scheduleChime() {
  if (!soundEnabled || !audioReady) { setTimeout(scheduleChime, 4000); return; }
  const t = audioCtx.currentTime;
  const chimeFreqs = [523, 659, 784, 880, 1047, 1175];
  const numNotes = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < numNotes; i++) {
    const delay = i * (0.15 + Math.random() * 0.25);
    const freq = chimeFreqs[Math.floor(Math.random() * chimeFreqs.length)];
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t + delay);
    gain.gain.linearRampToValueAtTime(0.022, t + delay + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + delay + 2.5);
    osc.connect(gain); gain.connect(masterGain);
    osc.start(t + delay); osc.stop(t + delay + 3);
  }
  setTimeout(scheduleChime, 8000 + Math.random() * 16000);
}

function enableSound() {
  if (!audioReady) initAudio();
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.85, audioCtx.currentTime + 2.5);
  soundEnabled = true;
}

function disableSound() {
  if (!audioCtx || !masterGain) return;
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
  soundEnabled = false;
}

// Sound button toggle
const soundBtn = document.getElementById('sound-btn');
const soundWaves = document.getElementById('sound-waves');
const soundMuted = document.getElementById('sound-icon-muted');

soundBtn.addEventListener('click', () => {
  if (!soundEnabled) {
    enableSound();
    soundWaves.style.display = 'flex';
    soundMuted.style.display = 'none';
    soundWaves.classList.remove('muted');
  } else {
    disableSound();
    soundWaves.classList.add('muted');
    setTimeout(() => {
      soundWaves.style.display = 'none';
      soundMuted.style.display = 'block';
    }, 300);
  }
});

/* ══ 3D TILT — desktop only ══ */
const scene = document.getElementById('scene');
const tilt  = document.getElementById('tilt');
if (window.matchMedia('(pointer:fine) and (hover:hover)').matches) {
  scene.addEventListener('mousemove', e => {
    const r = scene.getBoundingClientRect();
    const nx = (e.clientX - r.left) / r.width - 0.5;
    const ny = (e.clientY - r.top) / r.height - 0.5;
    tilt.style.transform = `rotateY(${nx * 10}deg) rotateX(${-ny * 7}deg)`;
  }, { passive: true });
  scene.addEventListener('mouseleave', () => {
    tilt.style.transition = 'transform 1s cubic-bezier(.34,1.56,.64,1)';
    tilt.style.transform = 'none';
    setTimeout(() => tilt.style.transition = 'transform .15s linear', 1000);
  });
}

/* ══ CANVAS ══ */
const bg  = document.getElementById('cvs-bg'),    bgX = bg.getContext('2d');
const sc  = document.getElementById('cvs-stars'), scX = sc.getContext('2d');
const pc  = document.getElementById('cvs-particles'), pcX = pc.getContext('2d');
let W = 0, H = 0, stars = [], particles = [];

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  [bg, sc, pc].forEach(c => {
    c.width = W * dpr; c.height = H * dpr;
    c.style.width = W + 'px'; c.style.height = H + 'px';
    c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  });
  initStars(); initParticles();
}

function initStars() {
  stars = Array.from({ length: 260 }, () => ({
    x: Math.random() * W, y: Math.random() * H * .86,
    r: Math.random() * 1.4 + .2, tw: Math.random() * Math.PI * 2,
    sp: .004 + Math.random() * .016,
    col: Math.random() < .07 ? [0,229,255] : Math.random() < .05 ? [255,26,107] : [255,255,255]
  }));
}

function initParticles() {
  particles = Array.from({ length: 32 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 2.2 + .5,
    vx: (Math.random() - .5) * .24, vy: -(Math.random() * .45 + .12),
    life: Math.random(),
    col: Math.random() < .55 ? [0,229,255] : [255,26,107]
  }));
}

let bgT = 0;
function drawAll() {
  bgT += .0016;
  bgX.clearRect(0, 0, W, H);
  const g1 = bgX.createRadialGradient(
    W*(.3+Math.sin(bgT)*.11), H*(.32+Math.cos(bgT*.7)*.09), 0, W*.5, H*.5, Math.max(W,H)*.88
  );
  g1.addColorStop(0, `hsla(${268+Math.sin(bgT)*14},78%,8%,.62)`);
  g1.addColorStop(.5, `hsla(${238+Math.cos(bgT)*18},68%,5%,.52)`);
  g1.addColorStop(1, 'rgba(3,0,18,0)');
  bgX.fillStyle = g1; bgX.fillRect(0, 0, W, H);
  const g2 = bgX.createRadialGradient(
    W*(.76+Math.cos(bgT*.8)*.09), H*(.62+Math.sin(bgT*.6)*.11), 0, W*.65, H*.6, Math.max(W,H)*.68
  );
  g2.addColorStop(0, `hsla(${12+Math.sin(bgT*1.2)*14},78%,7%,.38)`);
  g2.addColorStop(1, 'transparent');
  bgX.fillStyle = g2; bgX.fillRect(0, 0, W, H);

  scX.clearRect(0, 0, W, H);
  stars.forEach(s => {
    s.tw += s.sp;
    const o = .18 + Math.sin(s.tw) * .52;
    scX.beginPath(); scX.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    scX.fillStyle = `rgba(${s.col.join(',')},${Math.max(0, o)})`; scX.fill();
    if (s.r > .85) {
      scX.beginPath(); scX.arc(s.x, s.y, s.r * 2.6, 0, Math.PI * 2);
      scX.fillStyle = `rgba(${s.col.join(',')},${o * .08})`; scX.fill();
    }
  });

  pcX.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life += .002;
    if (p.y < -20 || p.life > 1) { p.y = H + 20; p.x = Math.random() * W; p.life = 0; }
    const a = Math.max(0, Math.sin(p.life * Math.PI)) * .45;
    pcX.beginPath(); pcX.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pcX.fillStyle = `rgba(${p.col.join(',')},${a})`; pcX.fill();
  });
  requestAnimationFrame(drawAll);
}
resize(); drawAll();
window.addEventListener('resize', resize, { passive: true });

/* ══ FIREFLIES ══ */
function createFireflies() {
  const count = window.innerWidth < 600 ? 5 : 9;
  for (let i = 0; i < count; i++) {
    const f = document.createElement('div');
    f.className = 'firefly';
    const x = 5 + Math.random() * 90;
    const y = 30 + Math.random() * 55;
    const tx = (Math.random() - .5) * 120;
    const ty = -30 - Math.random() * 80;
    const tx2 = (Math.random() - .5) * 60;
    const ty2 = 20 + Math.random() * 40;
    f.style.cssText = `
      left:${x}vw;top:${y}vh;
      --dur:${6+Math.random()*8}s;
      --delay:${Math.random()*-12}s;
      --tx:${tx}px;--ty:${ty}px;
      --tx2:${tx2}px;--ty2:${ty2}px;
    `;
    document.body.appendChild(f);
  }
}
createFireflies();

/* ══ FLOATING HEARTS ══ */
const HEARTS = ['💗','💕','💖','💓','💝','✨','🌸','💫','⭐','🌟'];
function spawnHearts(x, y, n = 2) {
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'fheart';
    el.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
    el.style.cssText = `left:${x+(Math.random()-.5)*55}px;top:${y}px;font-size:${Math.random()*.85+.85}rem;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}
document.addEventListener('click', e => spawnHearts(e.clientX, e.clientY, 3), { passive: true });
document.addEventListener('touchend', e => {
  const t = e.changedTouches[0]; spawnHearts(t.clientX, t.clientY, 3);
}, { passive: true });
(function moonHearts() {
  const m = document.querySelector('.moon');
  if (m) { const r = m.getBoundingClientRect(); spawnHearts(r.left + r.width/2, r.top + r.height, 2); }
  setTimeout(moonHearts, 2800 + Math.random() * 2200);
})();

/* ══ POPULATE DOB ══ */
const selDayEl = document.getElementById('sel-day');
const selYrEl  = document.getElementById('sel-yr');
for (let d = 1; d <= 31; d++) {
  const o = document.createElement('option');
  o.value = d; o.textContent = String(d).padStart(2, '0');
  selDayEl.appendChild(o);
}
const curYear = new Date().getFullYear();
for (let y = curYear - 5; y >= 1980; y--) {
  const o = document.createElement('option');
  o.value = y; o.textContent = y;
  selYrEl.appendChild(o);
}

/* ══ FORM HELPERS ══ */
function showErr(msg) {
  const el = document.getElementById('err-inner');
  el.textContent = msg; el.classList.remove('show');
  void el.offsetWidth; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4500);
  ['f-regno','sel-day','sel-mon','sel-yr'].forEach(id =>
    document.getElementById(id).classList.add('err')
  );
}
function clearErr() {
  ['f-regno','sel-day','sel-mon','sel-yr'].forEach(id =>
    document.getElementById(id).classList.remove('err')
  );
}
function setLoading(on) {
  document.getElementById('sbtn').disabled = on;
  document.getElementById('sloader').style.display = on ? 'block' : 'none';
  document.getElementById('sbtn-label').textContent = on ? 'Entering…' : 'Enter Your World';
}

/* ══ SUBMIT — same logic, untouched ══ */
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  clearErr();

  const regno   = document.getElementById('f-regno').value.trim().toUpperCase();
  const pickedD = parseInt(document.getElementById('sel-day').value, 10);
  const pickedM = parseInt(document.getElementById('sel-mon').value, 10);
  const pickedY = parseInt(document.getElementById('sel-yr').value, 10);

  if (!regno) { showErr('Please enter your register number, love 💕'); return; }
  if (!pickedD || !pickedM || !pickedY) { showErr('Please select your date of birth 🌸'); return; }

  const VALID_REG = '23UIT102';
  const VALID_D = 21, VALID_M = 4, VALID_Y = 2006;

  if (regno !== VALID_REG || pickedD !== VALID_D || pickedM !== VALID_M || pickedY !== VALID_Y) {
    const errs = [
      '✨ Hmm, that doesn\'t seem right… are you the one I made this for? 💕',
      '🌙 This world is made for someone very special. Try again, dear…',
      '💫 Not quite right — only one heart knows the way in…',
    ];
    showErr(errs[Math.floor(Math.random() * errs.length)]);
    return;
  }

  clearErr();
  setLoading(true);
  await new Promise(r => setTimeout(r, 900));

  sessionStorage.setItem('__suhaina_auth', 'granted');

  document.getElementById('success-ov').classList.add('show');
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      for (let j = 0; j < 6; j++) spawnHearts(Math.random() * W, Math.random() * H * .7);
    }, i * 200);
  }

  setTimeout(() => window.location.href = 'main.html', 2800);
});

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
