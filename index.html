<style>
:root {
  --rose:    #ff2d78;
  --roseDk:  #c4005a;
  --roseL:   #ff6fa8;
  --blush:   #ffb3cb;
  --pink:    #ff1493;
  --cream:   #fff0f5;
  --glass1:  rgba(255,255,255,0.07);
  --glass2:  rgba(255,255,255,0.12);
  --glassBd: rgba(255,150,180,0.25);
  --shadow:  rgba(180,0,80,0.25);
  --font-d:  'Playfair Display', serif;
  --font-e:  'Cormorant Garamond', serif;
  --font-c:  'Cinzel', serif;
  --font-r:  'Dancing Script', cursive;
  --spring:  cubic-bezier(.34,1.56,.64,1);
  --silk:    cubic-bezier(.25,.46,.45,.94);
}

*,*::before,*::after { margin:0;padding:0;box-sizing:border-box; }
html,body { height:100%;overflow:hidden; }

body {
  font-family: var(--font-e);
  -webkit-font-smoothing: antialiased;
  cursor: none;
  user-select: none;
  -webkit-user-select: none;
}

/* ── BACKGROUND ── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  width: 100%; height: 100%;
}

/* Gradient overlay */
.bg-grad {
  position: fixed; inset: 0; z-index: 1;
  background:
    radial-gradient(ellipse 70% 60% at 20% 30%, rgba(255,20,120,.18), transparent),
    radial-gradient(ellipse 60% 80% at 80% 70%, rgba(255,100,160,.12), transparent),
    radial-gradient(ellipse 90% 90% at 50% 50%, rgba(40,0,30,.92), rgba(20,0,15,.98));
  pointer-events: none;
}

/* ── CUSTOM CURSOR ── */
#c-dot, #c-ring {
  position: fixed; pointer-events: none; z-index: 99999;
  border-radius: 50%; transform: translate(-50%,-50%);
  will-change: transform;
}
#c-dot {
  width: 7px; height: 7px;
  background: var(--rose);
  box-shadow: 0 0 8px var(--rose), 0 0 25px rgba(255,45,120,.6);
}
#c-ring {
  width: 36px; height: 36px;
  border: 1.5px solid rgba(255,45,120,.5);
  transition: width .4s var(--spring), height .4s var(--spring), border-color .4s;
}
.cx #c-ring { width:55px;height:55px;border-color:rgba(255,45,120,.8); }
@media(pointer:coarse){#c-dot,#c-ring{display:none;}}

/* ── FLOATING HEARTS CANVAS ── */
#hearts-canvas {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none;
  width: 100%; height: 100%;
}

/* ── CLICK HEARTS ── */
.click-heart {
  position: fixed; pointer-events: none; z-index: 9999;
  animation: heartPop 1.8s ease-out forwards;
  font-size: 1.4rem;
  filter: drop-shadow(0 0 8px rgba(255,45,120,.8));
}
@keyframes heartPop {
  0%   { opacity:1; transform: translate(-50%,-50%) scale(0) rotate(-20deg); }
  30%  { opacity:1; transform: translate(-50%,-120%) scale(1.3) rotate(10deg); }
  100% { opacity:0; transform: translate(-50%,-300%) scale(0.4) rotate(25deg); }
}

/* ── SCENE ── */
#scene {
  position: fixed; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  perspective: 1200px;
}

/* ── CARD ── */
.card {
  position: relative;
  width: 100%; max-width: 440px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,150,180,.2);
  border-radius: 28px;
  padding: clamp(2rem,5vw,3rem) clamp(1.8rem,5vw,2.6rem);
  backdrop-filter: blur(60px) saturate(180%);
  -webkit-backdrop-filter: blur(60px) saturate(180%);
  box-shadow:
    0 0 0 1px rgba(255,45,120,.08),
    0 30px 80px rgba(180,0,80,.25),
    inset 0 1px 0 rgba(255,255,255,.12),
    inset 0 -1px 0 rgba(255,45,120,.08);
  overflow: hidden;
  transform-style: preserve-3d;
  transition: transform .12s linear;
}

/* Animated conic border */
.card::before {
  content: '';
  position: absolute; inset: -1.5px;
  border-radius: 28px;
  background: conic-gradient(
    from var(--a,0deg),
    var(--rose), var(--blush), #fff, var(--roseL), var(--pink), var(--rose)
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  padding: 1.5px;
  animation: borderSpin 6s linear infinite;
  opacity: .55;
  z-index: -1;
}
@property --a { syntax:'<angle>';initial-value:0deg;inherits:false; }
@keyframes borderSpin { to { --a: 360deg; } }

/* Card glow orbs */
.orb { position:absolute;border-radius:50%;filter:blur(50px);pointer-events:none; }
.orb1 { width:220px;height:220px;background:rgba(255,45,120,.06);top:-80px;left:-80px;animation:orbDrift 12s ease-in-out infinite; }
.orb2 { width:180px;height:180px;background:rgba(255,150,180,.05);bottom:-60px;right:-60px;animation:orbDrift 15s ease-in-out infinite reverse; }
@keyframes orbDrift { 0%,100%{transform:translate(0,0);}50%{transform:translate(20px,15px);} }

/* ── LOGO / HEADER ── */
.logo-area { text-align:center;margin-bottom:2.2rem;position:relative;z-index:1; }

.logo-ring {
  width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 1.2rem;
  background: radial-gradient(circle at 38% 38%, rgba(255,150,180,.15), rgba(255,45,120,.1));
  border: 1px solid rgba(255,150,180,.3);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 30px rgba(255,45,120,.25), inset 0 0 20px rgba(255,45,120,.05);
  animation: logoPulse 3s ease-in-out infinite;
  position: relative; overflow: hidden;
}
.logo-ring::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: conic-gradient(from 0deg, transparent 70%, rgba(255,150,180,.3) 100%);
  animation: logoSpin 4s linear infinite;
}
@keyframes logoPulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.05);box-shadow:0 0 50px rgba(255,45,120,.4);} }
@keyframes logoSpin { to{transform:rotate(360deg);} }

.logo-icon {
  font-size: 2.2rem; position: relative; z-index: 1;
  animation: iconBeat 1.8s ease-in-out infinite;
}
@keyframes iconBeat { 0%,100%{transform:scale(1);}50%{transform:scale(1.2);} }

.logo-name {
  font-family: var(--font-r);
  font-size: clamp(1.8rem,5vw,2.3rem);
  font-weight: 700;
  background: linear-gradient(135deg, #fff 20%, var(--blush) 50%, var(--rose) 80%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 10px rgba(255,45,120,.3));
  letter-spacing: .02em;
}
.logo-tagline {
  font-family: var(--font-e);
  font-style: italic;
  font-size: clamp(.85rem,2.2vw,1rem);
  color: rgba(255,200,220,.5);
  margin-top: .3rem;
  letter-spacing: .08em;
}

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: .7rem;
  margin: .5rem 0 1.8rem;
  position: relative; z-index: 1;
}
.div-l { flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,150,180,.2),transparent); }
.div-sym { font-size: .65rem; color: rgba(255,150,180,.4); }

/* ── FORM ── */
.fg { position:relative;z-index:1;margin-bottom:1.3rem; }
.fg-lbl {
  display: block;
  font-family: var(--font-c);
  font-size: .52rem;
  letter-spacing: .38em;
  text-transform: uppercase;
  color: rgba(255,150,180,.55);
  margin-bottom: .6rem;
  transition: color .3s;
}
.fg:focus-within .fg-lbl { color: var(--roseL); }

.fi-wrap { position: relative; }
.fi-icon { position:absolute;left:1rem;top:50%;transform:translateY(-50%);font-size:.95rem;opacity:.4;pointer-events:none;transition:opacity .3s; }
.fg:focus-within .fi-icon { opacity:.9; }

.finput {
  width: 100%;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,150,180,.15);
  border-radius: 14px;
  padding: .9rem 1rem .9rem 2.9rem;
  color: #fff;
  font-family: var(--font-e);
  font-size: .97rem;
  letter-spacing: .05em;
  outline: none;
  -webkit-appearance: none;
  transition: all .35s var(--spring);
}
.finput::placeholder { color:rgba(255,200,220,.25);font-style:italic; }
.finput:focus {
  border-color: rgba(255,45,120,.45);
  background: rgba(255,45,120,.04);
  box-shadow: 0 0 0 4px rgba(255,45,120,.06), 0 0 20px rgba(255,45,120,.07);
  transform: translateY(-1px);
}
.finput.err { border-color:rgba(255,45,120,.6);box-shadow:0 0 0 4px rgba(255,45,120,.08); }

/* Password toggle */
.pw-toggle { position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,150,180,.4);font-size:.85rem;transition:color .3s;padding:0;line-height:1; }
.pw-toggle:hover { color:rgba(255,150,180,.85); }
@media(pointer:fine){.pw-toggle{cursor:none;}}

/* ── SUBMIT BUTTON ── */
.sbtn {
  width:100%;margin-top:1.5rem;padding:1.05rem;
  border-radius:50px;border:none;
  background:linear-gradient(135deg,#a8003d,#e0005a,#ff2d78,#e0005a,#a8003d);
  background-size:300% 300%;
  animation:btnFlow 6s ease infinite;
  color:#fff;
  font-family:var(--font-c);
  font-size:.68rem;
  font-weight:500;
  letter-spacing:.32em;
  text-transform:uppercase;
  box-shadow:0 0 30px rgba(255,45,120,.35),0 12px 35px rgba(180,0,80,.4);
  overflow:hidden;position:relative;
  transition:transform .4s var(--spring),box-shadow .4s;
}
@keyframes btnFlow{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.sbtn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 0 50px rgba(255,45,120,.5),0 18px 50px rgba(180,0,80,.5);}
.sbtn:active{transform:scale(.98);}
.sbtn-shine{position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.2) 50%,transparent 65%);background-size:200% 100%;animation:shineSw 2.5s ease-in-out infinite;}
@keyframes shineSw{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.sbtn-txt{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:.6rem;}
.sloader{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}

/* ── ERROR ── */
#err-box{margin-top:.7rem;position:relative;z-index:1;text-align:center;min-height:1.4rem;}
.err-inner{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,45,120,.1);border:1px solid rgba(255,45,120,.3);border-radius:50px;padding:.42rem 1.2rem;font-family:var(--font-r);font-size:1rem;color:rgba(255,150,180,.95);opacity:0;transform:translateY(8px) scale(.95);transition:all .4s var(--spring);}
.err-inner.show{opacity:1;transform:translateY(0) scale(1);}

/* ── MESSAGE FIELD ── */
.msg-section{position:relative;z-index:1;margin-top:1.6rem;border-top:1px solid rgba(255,150,180,.1);padding-top:1.4rem;}
.msg-lbl{font-family:var(--font-c);font-size:.5rem;letter-spacing:.35em;color:rgba(255,150,180,.45);margin-bottom:.6rem;display:block;text-transform:uppercase;}
.msg-ta{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,150,180,.12);border-radius:12px;padding:.8rem 1rem;color:#fff;font-family:var(--font-e);font-style:italic;font-size:.92rem;resize:none;outline:none;min-height:70px;transition:all .35s;line-height:1.6;}
.msg-ta::placeholder{color:rgba(255,200,220,.2);font-style:italic;}
.msg-ta:focus{border-color:rgba(255,45,120,.35);background:rgba(255,45,120,.03);box-shadow:0 0 0 3px rgba(255,45,120,.05);}
.msg-send{margin-top:.7rem;width:100%;padding:.7rem;border-radius:50px;border:1px solid rgba(255,150,180,.25);background:rgba(255,45,120,.06);color:rgba(255,200,220,.7);font-family:var(--font-c);font-size:.52rem;letter-spacing:.28em;text-transform:uppercase;transition:all .3s;}
.msg-send:hover{background:rgba(255,45,120,.12);border-color:rgba(255,150,180,.4);color:rgba(255,220,235,.9);}
@media(pointer:fine){.msg-send{cursor:none;}}

/* ── FOOTER ── */
.foot{position:relative;z-index:1;text-align:center;margin-top:1.3rem;font-family:var(--font-c);font-size:.48rem;letter-spacing:.2em;color:rgba(255,255,255,.12);text-transform:uppercase;}

/* ── SUCCESS OVERLAY ── */
#sov{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(80,0,40,.98),rgba(20,0,15,1));opacity:0;pointer-events:none;transition:opacity 1s ease;text-align:center;padding:2rem;}
#sov.show{opacity:1;pointer-events:all;}
.sov-ring{width:110px;height:110px;border-radius:50%;margin:0 auto 2rem;background:radial-gradient(circle at 38% 38%,rgba(255,150,180,.15),rgba(255,45,120,.1));border:1px solid rgba(255,150,180,.4);display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 0 40px rgba(255,45,120,.35);animation:sovPop .8s var(--spring) both;}
@keyframes sovPop{from{transform:scale(0) rotate(-180deg);}to{transform:scale(1) rotate(0);}}
.sov-h{font-family:var(--font-r);font-size:clamp(2.5rem,8vw,4rem);font-weight:700;background:linear-gradient(135deg,#fff,var(--blush),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:sovSlide .9s var(--spring) .3s both;opacity:0;}
.sov-s{font-family:var(--font-c);font-size:.58rem;letter-spacing:.4em;color:rgba(255,150,180,.6);margin-top:.8rem;animation:sovSlide .9s var(--spring) .6s both;opacity:0;}
@keyframes sovSlide{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="c-dot"></div>
<div id="c-ring"></div>

<canvas id="bg-canvas"></canvas>

<div id="scene">
  <div class="card" id="card">
    <div class="orb orb1"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── REPLACE WITH YOUR FIREBASE CONFIG ──
const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let app, auth, db;
try {
  app = initializeApp(FIREBASE_CONFIG);
  auth = getAuth(app);
  db = getFirestore(app);
  window.__fb = { auth, db, signInWithEmailAndPassword, collection, addDoc, serverTimestamp };
} catch(e) {
  console.warn('[Firebase] Demo mode');
  window.__fb = null;
}
</script>

<script>
/* ══ CURSOR ══ */
const cDot = document.getElementById('c-dot');
const cRing = document.getElementById('c-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cDot.style.left=mx+'px';cDot.style.top=my+'px';},{passive:true});
(function cLoop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cRing.style.left=rx+'px';cRing.style.top=ry+'px';requestAnimationFrame(cLoop);})();
document.querySelectorAll('button,input,select,.card').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('cx'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('cx'));
});

/* ══ CLICK HEARTS ══ */
const HEARTS=['💗','💕','💖','💓','💝','🌸','✨','💫'];
function spawnHeart(x,y){
  const el=document.createElement('div');
  el.className='click-heart';
  el.textContent=HEARTS[Math.floor(Math.random()*HEARTS.length)];
  el.style.left=x+'px';el.style.top=y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1800);
}
document.addEventListener('click',e=>spawnHeart(e.clientX,e.clientY),{passive:true});
document.addEventListener('touchend',e=>{const t=e.changedTouches[0];spawnHeart(t.clientX,t.clientY);},{passive:true});

/* ══ BACKGROUND CANVAS ══ */
const bgC=document.getElementById('bg-canvas');
const bgX=bgC.getContext('2d');
let W=0,H=0,stars=[];
function resize(){W=bgC.width=window.innerWidth;H=bgC.height=window.innerHeight;initStars();}
function initStars(){stars=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*.9+.2,tw:Math.random()*Math.PI*2,sp:.005+Math.random()*.012}));}
let bgt=0;
function drawBg(){
  bgt+=.001;bgX.clearRect(0,0,W,H);
  stars.forEach(s=>{s.tw+=s.sp;const a=Math.max(0,.1+Math.sin(s.tw)*.5);bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);bgX.fillStyle=`rgba(255,150,180,${a})`;bgX.fill();});
  requestAnimationFrame(drawBg);
}
resize();drawBg();
window.addEventListener('resize',resize,{passive:true});

/* ══ FLOATING HEARTS CANVAS ══ */
const hC=document.getElementById('hearts-canvas');
const hX=hC.getContext('2d');
function resizeH(){hC.width=window.innerWidth;hC.height=window.innerHeight;}
resizeH();
window.addEventListener('resize',resizeH,{passive:true});

class FloatHeart {
  constructor(){this.reset(true);}
  reset(init=false){
    this.x=Math.random()*hC.width;
    this.y=init?Math.random()*hC.height:hC.height+50;
    this.size=Math.random()*22+8;
    this.speed=Math.random()*.6+.25;
    this.drift=(Math.random()-.5)*.4;
    this.opacity=Math.random()*.5+.15;
    this.rot=Math.random()*Math.PI*2;
    this.rotSpeed=(Math.random()-.5)*.025;
    this.wobble=Math.random()*Math.PI*2;
    this.wobbleSpeed=Math.random()*.04+.01;
    this.wobbleAmp=Math.random()*1.2+.4;
    this.pulse=Math.random()*Math.PI*2;
    this.pulseSpeed=Math.random()*.03+.015;
  }
  draw(ctx){
    this.y-=this.speed;
    this.wobble+=this.wobbleSpeed;
    this.rot+=this.rotSpeed;
    this.pulse+=this.pulseSpeed;
    this.x+=Math.sin(this.wobble)*this.wobbleAmp+this.drift;
    const sc=this.size*(1+Math.sin(this.pulse)*.06);
    const op=this.opacity*(0.7+Math.sin(this.pulse)*.3);
    if(this.y<-60||this.x<-60||this.x>hC.width+60)this.reset();
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);ctx.globalAlpha=op;
    // Draw heart shape
    const s=sc*.5;
    ctx.beginPath();
    ctx.moveTo(0,-s*.5);
    ctx.bezierCurveTo(s*.5,-s*1.2,s*1.3,-s*.5,s*1.1,s*.3);
    ctx.bezierCurveTo(s*.9,s*.9,0,s*1.4,0,s*1.4);
    ctx.bezierCurveTo(0,s*1.4,-s*.9,s*.9,-s*1.1,s*.3);
    ctx.bezierCurveTo(-s*1.3,-s*.5,-s*.5,-s*1.2,0,-s*.5);
    ctx.closePath();
    // Gradient fill
    const grd=ctx.createRadialGradient(0,-s*.2,0,0,s*.3,s*1.5);
    grd.addColorStop(0,'rgba(255,180,210,'+op+')');
    grd.addColorStop(.5,'rgba(255,45,120,'+op*.8+')');
    grd.addColorStop(1,'rgba(180,0,80,'+op*.4+')');
    ctx.fillStyle=grd;
    ctx.fill();
    ctx.strokeStyle='rgba(255,150,180,'+(op*.3)+')';
    ctx.lineWidth=.5;ctx.stroke();
    ctx.restore();
  }
}

const floatHearts=Array.from({length:45},()=>new FloatHeart());
function drawHearts(){
  hX.clearRect(0,0,hC.width,hC.height);
  floatHearts.forEach(h=>h.draw(hX));
  requestAnimationFrame(drawHearts);
}
drawHearts();

/* ══ 3D TILT ══ */
const card=document.getElementById('card');
document.getElementById('scene').addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  const nx=(e.clientX-r.left)/r.width-.5;
  const ny=(e.clientY-r.top)/r.height-.5;
  card.style.transform=`rotateY(${nx*10}deg) rotateX(${-ny*7}deg)`;
});
document.getElementById('scene').addEventListener('mouseleave',()=>{
  card.style.transition='transform .9s var(--spring)';
  card.style.transform='none';
  setTimeout(()=>card.style.transition='transform .12s linear',900);
});

/* ══ FORM HELPERS ══ */
function showErr(msg){
  const el=document.getElementById('err-inner');
  el.textContent=msg; el.classList.remove('show');
  void el.offsetWidth; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),5000);
  document.querySelectorAll('.finput').forEach(x=>x.classList.add('err'));
}
function clearErrs(){ document.querySelectorAll('.finput').forEach(x=>x.classList.remove('err')); }
function setLoading(on){
  document.getElementById('sbtn').disabled=on;
  document.getElementById('sloader').style.display=on?'block':'none';
  document.getElementById('sbtn-lbl').textContent=on?'Entering…':'Enter Your World';
}

/* ══ SUBMIT — pure JS, zero Firebase ══ */
document.getElementById('lform').addEventListener('submit', async e => {
  e.preventDefault();
  clearErrs();

  const username = document.getElementById('f-user').value.trim();
  const password = document.getElementById('f-pass').value;

  if(!username){ showErr('Please enter your username 💕'); return; }
  if(!password){ showErr('Please enter your password 🌸'); return; }

  // ── Credentials (only these two lines matter) ──
  const VALID_USER = '23UIT102';
  const VALID_PASS = '21/04/2006';

  if(username !== VALID_USER || password !== VALID_PASS){
    const errs=[
      '✨ Hmm… are you the one this was made for? 💕',
      '🌸 This world belongs to someone very special. Try again…',
      '💫 Only one heart knows the way in…',
    ];
    showErr(errs[Math.floor(Math.random()*errs.length)]);
    return;
  }

  // Correct — proceed
  clearErrs();
  setLoading(true);
  await new Promise(r=>setTimeout(r,900));
  sessionStorage.setItem('__suhaina_auth','granted');

  // Success burst + redirect
  const sov=document.getElementById('sov');
  sov.classList.add('show');
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      for(let j=0;j<5;j++) spawnHeart(Math.random()*window.innerWidth, Math.random()*window.innerHeight*.7);
    }, i*150);
  }
  setTimeout(()=>window.location.href='main.html', 2800);
});
