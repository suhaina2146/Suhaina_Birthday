<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>404 — Lost in the Night · Suhaina Universe</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#030012">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Dancing+Script:wght@400;700&family=Josefin+Sans:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
:root {
  --void:#030012;--cyan:#00e5ff;--pink:#ff1a6b;--violet:#8b00ff;
  --gold:#ffc300;--b1:rgba(0,229,255,.12);
  --gc:0 0 8px #00e5ff,0 0 25px rgba(0,229,255,.5),0 0 60px rgba(0,229,255,.2);
  --gc-pink:0 0 8px #ff1a6b,0 0 25px rgba(255,26,107,.45),0 0 55px rgba(255,26,107,.15);
  --font-tech:'Orbitron',monospace;
  --font-rom:'Dancing Script',cursive;
  --font-ui:'Josefin Sans',sans-serif;
  --spring:cubic-bezier(.34,1.56,.64,1);
  --ease:cubic-bezier(.25,.46,.45,.94);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--void);font-family:var(--font-ui);font-weight:300;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  user-select:none;-webkit-user-select:none;
}

/* ── CANVASES ── */
#cvs-bg,#cvs-stars{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;}
#cvs-bg{z-index:0;}#cvs-stars{z-index:1;}

/* ── MOON (drifted to left, partially hidden — lost theme) ── */
#moon-scene{
  position:fixed;top:8vh;left:-2vw;z-index:3;pointer-events:none;
  opacity:.55;
  animation:moonIn 2.5s var(--ease) both, moonDrift 14s ease-in-out infinite 2.5s;
}
@keyframes moonIn{from{opacity:0;transform:translateX(-30px);}to{opacity:.55;transform:translateX(0);}}
@keyframes moonDrift{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.moon{
  width:clamp(80px,12vw,150px);height:clamp(80px,12vw,150px);
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff9e6,#ffedb5,#ffd54f,#ff8f00);
  box-shadow:0 0 30px rgba(255,213,79,.7),0 0 80px rgba(255,213,79,.4),
             0 0 160px rgba(255,213,79,.15),inset 0 0 30px rgba(255,200,0,.25);
  position:relative;overflow:hidden;
  /* Crescent shadow overlay — moon looks "lost"/dimmed */
  filter:brightness(.7) contrast(1.1);
}
.moon::before{content:'';position:absolute;top:15%;left:25%;width:22%;height:22%;border-radius:50%;background:rgba(220,160,0,.2);}
.moon::after{content:'';position:absolute;top:55%;left:58%;width:14%;height:14%;border-radius:50%;background:rgba(220,160,0,.15);}
/* crescent overlay */
.moon-crescent{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 65% 42%,rgba(3,0,18,.88) 38%,transparent 70%);
}
.moon-halo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(255,213,79,.08);}
.moon-halo:nth-child(2){width:160%;height:160%;animation:haloP 5s ease-in-out infinite;}
.moon-halo:nth-child(3){width:240%;height:240%;animation:haloP 5s ease-in-out infinite 1s;}
@keyframes haloP{0%,100%{opacity:.3;}50%{opacity:.07;}}

/* ── HILLS ── */
.hills{
  position:fixed;bottom:0;left:0;right:0;z-index:3;pointer-events:none;
  height:clamp(60px,12vh,180px);
}

/* ── FIREFLIES ── */
.firefly{
  position:fixed;pointer-events:none;z-index:4;
  width:3px;height:3px;border-radius:50%;
  background:rgba(255,235,100,.85);
  box-shadow:0 0 5px 2px rgba(255,235,100,.5),0 0 12px rgba(255,200,0,.25);
  animation:fireflyDrift var(--dur,9s) ease-in-out infinite var(--delay,0s);
}
@keyframes fireflyDrift{
  0%{opacity:0;transform:translate(0,0);}
  20%{opacity:.8;}
  50%{transform:translate(var(--tx,25px),var(--ty,-35px));}
  80%{opacity:.5;}
  100%{opacity:0;transform:translate(var(--tx2,10px),var(--ty2,15px));}
}

/* ── MAIN LAYOUT ── */
#page{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.5rem;text-align:center;
  overflow-y:auto;
}

/* ── LOGO AREA ── */
.logo-area{
  margin-bottom:2.2rem;
  animation:riseIn .9s var(--spring) .1s both;
}
.logo-glyph{
  display:inline-flex;width:clamp(50px,7vw,66px);height:clamp(50px,7vw,66px);
  border-radius:50%;
  background:linear-gradient(135deg,rgba(0,229,255,.1),rgba(255,26,107,.1));
  border:1px solid rgba(0,229,255,.22);
  align-items:center;justify-content:center;
  font-size:clamp(1.3rem,3vw,1.8rem);margin:0 auto .65rem;
  box-shadow:var(--gc),inset 0 0 16px rgba(0,229,255,.04);
  animation:logoPulse 3.5s ease-in-out infinite;
}
@keyframes logoPulse{
  0%,100%{box-shadow:var(--gc),inset 0 0 16px rgba(0,229,255,.04);transform:scale(1);}
  50%{box-shadow:var(--gc),inset 0 0 28px rgba(0,229,255,.08),0 0 65px rgba(0,229,255,.1);transform:scale(1.04);}
}
.logo-title{
  font-family:var(--font-tech);font-size:clamp(.52rem,1.6vw,.88rem);
  font-weight:600;letter-spacing:.3em;text-transform:uppercase;
  background:linear-gradient(90deg,var(--cyan),var(--pink),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 5px rgba(0,229,255,.2));
}
.logo-sub{
  font-family:var(--font-rom);font-size:clamp(.8rem,2vw,1.1rem);
  color:rgba(255,215,0,.5);margin-top:.25rem;
}

/* ── DIVIDER ── */
.div-row{
  display:flex;align-items:center;gap:.7rem;
  margin:0 auto 1.8rem;width:100%;max-width:380px;
  animation:riseIn .9s var(--spring) .3s both;
}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--b1),transparent);}
.div-icon{font-size:.6rem;color:rgba(0,229,255,.3);}

/* ── 404 NUMBER ── */
.num-404{
  position:relative;margin-bottom:.6rem;
  animation:riseIn 1s var(--spring) .2s both;
  line-height:1;
}
.num-404-text{
  font-family:var(--font-tech);
  font-size:clamp(5.5rem,22vw,13rem);
  font-weight:900;letter-spacing:-.02em;
  background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(139,0,255,.12),rgba(255,26,107,.15));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;z-index:1;
  /* ghost/hollow look */
  -webkit-text-stroke:1.5px rgba(0,229,255,.28);
}
.num-404-shadow{
  position:absolute;inset:0;
  font-family:var(--font-tech);
  font-size:clamp(5.5rem,22vw,13rem);
  font-weight:900;letter-spacing:-.02em;
  -webkit-text-stroke:0px transparent;
  background:linear-gradient(135deg,var(--cyan),var(--violet),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:blur(28px);opacity:.25;
  animation:glowPulse 3s ease-in-out infinite;
  pointer-events:none;user-select:none;
}
@keyframes glowPulse{0%,100%{opacity:.2;filter:blur(28px);}50%{opacity:.38;filter:blur(38px);}}

/* Floating "0" in middle replaced by moon emoji */
.num-mid-moon{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(2rem,7vw,5rem);
  animation:moonSpin 18s linear infinite;
  filter:drop-shadow(0 0 12px rgba(255,213,79,.6));
  z-index:2;
}
@keyframes moonSpin{0%{transform:translate(-50%,-50%) rotate(0deg);}100%{transform:translate(-50%,-50%) rotate(360deg);}}

/* ── GLITCH LINE ── */
.glitch-line{
  position:absolute;left:0;right:0;
  height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--pink),transparent);
  opacity:0;animation:glitchScan 4s ease-in-out infinite 1s;
}
@keyframes glitchScan{
  0%,100%{opacity:0;top:10%;}
  8%{opacity:.7;top:10%;}
  30%{opacity:.4;top:90%;}
  32%{opacity:0;}
}

/* ── MESSAGE AREA ── */
.msg-area{
  max-width:420px;margin:0 auto;
  animation:riseIn 1s var(--spring) .45s both;
}
.msg-main{
  font-family:var(--font-rom);
  font-size:clamp(1.6rem,5vw,2.5rem);
  color:#fff;letter-spacing:.02em;
  margin-bottom:.55rem;
  text-shadow:0 0 30px rgba(255,26,107,.3);
}
.msg-main span{
  background:linear-gradient(90deg,var(--gold),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.msg-sub{
  font-family:var(--font-ui);font-size:clamp(.72rem,1.8vw,.88rem);
  color:rgba(255,255,255,.32);letter-spacing:.1em;
  line-height:1.7;font-weight:300;
  margin-bottom:1.8rem;
}

/* ── CARD WRAP ── */
.card-wrap{
  position:relative;max-width:420px;width:100%;
  background:linear-gradient(145deg,rgba(0,10,52,.82),rgba(0,5,28,.88),rgba(7,0,32,.85));
  border-radius:22px;
  padding:clamp(1.4rem,4vw,2.2rem) clamp(1.2rem,4vw,2rem);
  backdrop-filter:blur(50px) saturate(180%);
  -webkit-backdrop-filter:blur(50px) saturate(180%);
  overflow:hidden;
  box-shadow:0 25px 70px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04),
             inset 0 1px 0 rgba(255,255,255,.05);
  animation:riseIn 1s var(--spring) .55s both;
}
.card-wrap::before{
  content:'';position:absolute;inset:-1px;border-radius:22px;
  background:conic-gradient(from var(--angle,0deg),var(--cyan),var(--pink),var(--violet),var(--gold),var(--cyan));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;
  padding:1.5px;animation:borderSpin 7s linear infinite;opacity:.45;
}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false;}
@keyframes borderSpin{to{--angle:360deg;}}
.card-orb{position:absolute;border-radius:50%;filter:blur(55px);pointer-events:none;}
.orb1{width:180px;height:180px;background:rgba(0,229,255,.05);top:-50px;left:-50px;animation:orbDrift 13s ease-in-out infinite;}
.orb2{width:140px;height:140px;background:rgba(255,26,107,.04);bottom:-40px;right:-40px;animation:orbDrift 15s ease-in-out infinite reverse;}
@keyframes orbDrift{0%,100%{transform:translate(0,0);}50%{transform:translate(12px,8px);}}

/* ── STATUS ROW ── */
.status-row{
  display:flex;align-items:center;justify-content:center;gap:.7rem;
  margin-bottom:1.3rem;position:relative;z-index:1;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--pink);
  box-shadow:var(--gc-pink);
  animation:dotBlink 2s ease-in-out infinite;
}
@keyframes dotBlink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}
.status-text{
  font-family:var(--font-tech);font-size:clamp(.38rem,.85vw,.5rem);
  letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,100,140,.7);
}

/* ── ERROR CODE ROW ── */
.error-code-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:.5rem;margin-bottom:1.4rem;position:relative;z-index:1;
}
.ec-item{
  background:rgba(0,229,255,.03);border:1px solid rgba(0,229,255,.1);
  border-radius:10px;padding:.6rem .4rem;text-align:center;
}
.ec-label{
  font-family:var(--font-tech);font-size:clamp(.3rem,.65vw,.4rem);
  letter-spacing:.22em;color:rgba(0,229,255,.3);text-transform:uppercase;
  display:block;margin-bottom:.3rem;
}
.ec-val{
  font-family:var(--font-tech);font-size:clamp(.6rem,1.4vw,.78rem);
  color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.08em;
}
.ec-val.pink{color:rgba(255,110,150,.8);}
.ec-val.gold{color:rgba(255,195,0,.75);}

/* ── BACK BUTTON ── */
.back-btn{
  position:relative;z-index:1;width:100%;
  padding:clamp(.75rem,2.5vw,.95rem);
  border-radius:50px;border:none;
  background:linear-gradient(135deg,#0a00cc,#8b00ff,#ff1a6b,#ff6b00);
  background-size:300% 300%;animation:btnGrad 6s ease infinite;
  color:#fff;font-family:var(--font-tech);
  font-size:clamp(.52rem,1.4vw,.68rem);font-weight:600;
  letter-spacing:.24em;text-transform:uppercase;
  box-shadow:0 0 26px rgba(139,0,255,.3),0 10px 32px rgba(0,0,0,.5);
  overflow:hidden;cursor:pointer;
  transition:transform .35s var(--spring),box-shadow .35s;
  -webkit-tap-highlight-color:transparent;
  text-decoration:none;display:block;
}
@keyframes btnGrad{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.back-btn:hover{transform:translateY(-2px) scale(1.015);box-shadow:0 0 42px rgba(0,229,255,.3),0 14px 42px rgba(0,0,0,.55);}
.back-btn:active{transform:scale(.97);}
.back-btn-shine{
  position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.2) 50%,transparent 62%);
  background-size:200% 100%;animation:shineSweep 2.6s ease-in-out infinite;
}
@keyframes shineSweep{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.back-btn-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:.55rem;}

/* ── POETRY NOTE ── */
.poetry-note{
  margin-top:1.4rem;
  font-family:var(--font-rom);font-size:clamp(.85rem,2.2vw,1.1rem);
  color:rgba(255,215,0,.35);letter-spacing:.03em;
  animation:riseIn 1.2s var(--spring) .75s both;
}

/* ── FLOATING HEARTS ── */
.fheart{
  position:fixed;pointer-events:none;z-index:9998;
  animation:fhUp 4s ease-out forwards;line-height:1;
}
@keyframes fhUp{
  0%{opacity:.95;transform:translateY(0) scale(1) rotate(0deg);}
  100%{opacity:0;transform:translateY(-380px) scale(.05) rotate(20deg);}
}

@keyframes riseIn{
  from{opacity:0;transform:translateY(22px) scale(.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* ── RESPONSIVE ── */
@media(max-height:620px){
  .logo-area{margin-bottom:1rem;}
  .logo-glyph{width:42px;height:42px;font-size:1.2rem;}
  .num-404-text{font-size:clamp(4rem,16vw,8rem);}
  .num-mid-moon{font-size:clamp(1.5rem,5vw,3.5rem);}
  .msg-main{font-size:clamp(1.2rem,4vw,1.8rem);}
  .div-row{margin-bottom:1.2rem;}
  .card-wrap{padding:1rem 1rem;}
  .error-code-row{gap:.35rem;}
  .poetry-note{margin-top:.8rem;}
}
@media(max-width:360px){
  .card-wrap{padding:1rem .85rem;}
  .error-code-row{grid-template-columns:1fr;gap:.35rem;}
}
</style>
</head>
<body>

<canvas id="cvs-bg"></canvas>
<canvas id="cvs-stars"></canvas>

<!-- MOON -->
<div id="moon-scene">
  <div class="moon">
    <div class="moon-crescent"></div>
    <div class="moon-halo"></div>
    <div class="moon-halo"></div>
  </div>
</div>

<!-- HILLS -->
<svg class="hills" viewBox="0 0 1440 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,220 Q200,100 400,165 Q600,225 800,115 Q1000,30 1200,150 Q1350,225 1440,100 L1440,220Z" fill="rgba(5,0,30,.92)"/>
  <path d="M0,220 Q250,140 480,185 Q700,220 920,150 Q1100,95 1260,175 Q1380,220 1440,140 L1440,220Z" fill="rgba(8,0,40,.95)"/>
  <path d="M0,220 L1440,220 L1440,190 Q800,165 0,195Z" fill="rgba(9,0,42,1)"/>
</svg>

<!-- PAGE -->
<div id="page">

  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-glyph">🌙</div>
    <div class="logo-title">Suhaina · Universe</div>
    <div class="logo-sub">A world made only for you</div>
  </div>

  <!-- Divider -->
  <div class="div-row">
    <div class="div-line"></div>
    <span class="div-icon">✦</span>
    <div class="div-line"></div>
  </div>

  <!-- 404 Number -->
  <div class="num-404">
    <div class="num-404-shadow" aria-hidden="true">404</div>
    <div class="num-404-text">4<span style="opacity:0">0</span>4</div>
    <div class="num-mid-moon" aria-hidden="true">🌑</div>
    <div class="glitch-line"></div>
  </div>

  <!-- Message -->
  <div class="msg-area">
    <div class="msg-main">Lost in the <span>Night</span>…</div>
    <div class="msg-sub">This page wandered off into the dark.<br>Even the moon couldn't find it.</div>
  </div>

  <!-- Card -->
  <div class="card-wrap">
    <div class="card-orb orb1"></div>
    <div class="card-orb orb2"></div>

    <!-- Status -->
    <div class="status-row">
      <div class="status-dot"></div>
      <span class="status-text">Signal Lost · Page Not Found</span>
    </div>

    <!-- Error info grid -->
    <div class="error-code-row">
      <div class="ec-item">
        <span class="ec-label">Error</span>
        <span class="ec-val pink">404</span>
      </div>
      <div class="ec-item">
        <span class="ec-label">Status</span>
        <span class="ec-val">Not Found</span>
      </div>
      <div class="ec-item">
        <span class="ec-label">Universe</span>
        <span class="ec-val gold">Suhaina</span>
      </div>
    </div>

    <!-- Back Button -->
    <a href="index.html" class="back-btn">
      <span class="back-btn-shine"></span>
      <span class="back-btn-inner">🌙 &nbsp;Return to Your World</span>
    </a>
  </div>

  <!-- Poetry -->
  <div class="poetry-note">✦ Some paths lead back to where you belong ✦</div>

</div>

<script>
/* ── CANVAS ── */
const bg = document.getElementById('cvs-bg'),    bgX = bg.getContext('2d');
const sc = document.getElementById('cvs-stars'), scX = sc.getContext('2d');
let W = 0, H = 0, stars = [];

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  [bg, sc].forEach(c => {
    c.width = W * dpr; c.height = H * dpr;
    c.style.width = W + 'px'; c.style.height = H + 'px';
    c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  });
  initStars();
}

function initStars() {
  stars = Array.from({ length: 220 }, () => ({
    x: Math.random() * W, y: Math.random() * H * .88,
    r: Math.random() * 1.3 + .2,
    tw: Math.random() * Math.PI * 2,
    sp: .004 + Math.random() * .015,
    col: Math.random() < .07 ? [0,229,255] : Math.random() < .05 ? [255,26,107] : [255,255,255]
  }));
}

let bgT = 0;
function draw() {
  bgT += .0014;
  bgX.clearRect(0, 0, W, H);
  const g = bgX.createRadialGradient(
    W*(.28+Math.sin(bgT)*.1), H*(.3+Math.cos(bgT*.6)*.08), 0, W*.5, H*.5, Math.max(W,H)*.9
  );
  g.addColorStop(0, `hsla(${265+Math.sin(bgT)*12},75%,7%,.6)`);
  g.addColorStop(.5, `hsla(${238+Math.cos(bgT)*16},65%,5%,.5)`);
  g.addColorStop(1, 'rgba(3,0,18,0)');
  bgX.fillStyle = g; bgX.fillRect(0, 0, W, H);

  const g2 = bgX.createRadialGradient(
    W*(.7+Math.cos(bgT*.7)*.08), H*(.55+Math.sin(bgT*.5)*.1), 0, W*.6, H*.55, Math.max(W,H)*.65
  );
  g2.addColorStop(0, `hsla(${340+Math.sin(bgT*1.1)*10},75%,6%,.3)`);
  g2.addColorStop(1, 'transparent');
  bgX.fillStyle = g2; bgX.fillRect(0, 0, W, H);

  scX.clearRect(0, 0, W, H);
  stars.forEach(s => {
    s.tw += s.sp;
    const o = .15 + Math.sin(s.tw) * .5;
    scX.beginPath(); scX.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    scX.fillStyle = `rgba(${s.col.join(',')},${Math.max(0, o)})`; scX.fill();
    if (s.r > .85) {
      scX.beginPath(); scX.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
      scX.fillStyle = `rgba(${s.col.join(',')},${o * .07})`; scX.fill();
    }
  });
  requestAnimationFrame(draw);
}
resize(); draw();
window.addEventListener('resize', resize, { passive: true });

/* ── FIREFLIES ── */
(function spawnFireflies() {
  const count = window.innerWidth < 600 ? 4 : 7;
  for (let i = 0; i < count; i++) {
    const f = document.createElement('div');
    f.className = 'firefly';
    const x = 10 + Math.random() * 80;
    const y = 25 + Math.random() * 55;
    f.style.cssText = `
      left:${x}vw;top:${y}vh;
      --dur:${7+Math.random()*9}s;
      --delay:${Math.random()*-14}s;
      --tx:${(Math.random()-.5)*110}px;
      --ty:${-25-Math.random()*70}px;
      --tx2:${(Math.random()-.5)*55}px;
      --ty2:${15+Math.random()*35}px;
    `;
    document.body.appendChild(f);
  }
})();

/* ── FLOATING HEARTS on click/touch ── */
const HEARTS = ['💗','💕','💖','💓','💝','✨','🌸','💫','⭐','🌟'];
function spawnHearts(x, y, n = 3) {
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'fheart';
    el.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
    el.style.cssText = `left:${x+(Math.random()-.5)*55}px;top:${y}px;font-size:${Math.random()*.85+.8}rem;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}
document.addEventListener('click', e => spawnHearts(e.clientX, e.clientY, 3), { passive: true });
document.addEventListener('touchend', e => {
  const t = e.changedTouches[0]; spawnHearts(t.clientX, t.clientY, 3);
}, { passive: true });

/* ── Moon periodic hearts ── */
(function moonHearts() {
  const m = document.querySelector('.moon');
  if (m) { const r = m.getBoundingClientRect(); spawnHearts(r.left + r.width/2, r.top + r.height, 2); }
  setTimeout(moonHearts, 3200 + Math.random() * 2500);
})();

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
